name: PR-045 permit-bound submission

on:
  pull_request:
    paths:
      - "src/submission/**"
      - "tests/test_pr045_permit_bound_submission.py"
      - "tests/fixtures/pr045/**"
      - "docs/architecture/pr045_permit_bound_submission.md"
      - ".github/workflows/pr045-permit-bound-submission.yml"

permissions:
  contents: read

jobs:
  focused:
    name: PR-045 focused verification
    runs-on: ubuntu-latest
    env:
      PAPER_TRADING_ONLY: "true"
      LIVE_TRADING_ENABLED: "false"
      JITO_ENABLED: "false"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13.13"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt
      - run: python -m pip install --requirement requirements.txt
      - run: python -m pip install --requirement requirements-dev.txt
      - run: python -m pip install --no-deps .
      - run: python -m black --check src/submission tests/test_pr045_permit_bound_submission.py
      - run: python -m mypy --config-file mypy.ini src/submission
      - run: python -m pytest tests/test_pr045_permit_bound_submission.py -q --disable-socket --allow-unix-socket
      - run: python -m compileall -q src/submission tests/test_pr045_permit_bound_submission.py
