name: PR-124 program deployment attestation

on:
  pull_request:
    paths:
      - "src/program_attestation_pr124.py"
      - "tests/test_pr124_program_attestation.py"
      - ".github/workflows/pr124-program-attestation.yml"
  push:
    branches:
      - "pr-124-program-deployment-attestation"

permissions:
  contents: read

jobs:
  focused:
    runs-on: ubuntu-latest
    env:
      PAPER_TRADING_ONLY: "true"
      LIVE_TRADING: "false"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13.13"
      - run: python -m pip install --upgrade pip
      - run: python -m pip install --requirement requirements.txt
      - run: python -m pip install --requirement requirements-dev.txt
      - run: python -m pip install --no-deps .
      - name: Black
        run: >-
          python -m black --check
          src/program_attestation_pr124.py
          tests/test_pr124_program_attestation.py
      - name: Focused PR-124 tests
        run: >-
          python -m pytest
          tests/test_pr124_program_attestation.py
          -q --disable-socket --allow-unix-socket
      - name: Compile
        run: >-
          python -m compileall -q
          src/program_attestation_pr124.py
          tests/test_pr124_program_attestation.py
      - name: PR-124 self-check
        run: >-
          python -m src.program_attestation_pr124
          --json
