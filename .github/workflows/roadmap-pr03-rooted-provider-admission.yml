name: Roadmap PR-03 rooted provider admission

on:
  pull_request:
    branches: [main]
  push:
    branches:
      - roadmap-pr-03-rooted-provider-admission

permissions:
  contents: read

jobs:
  rebuild-metadata:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Capture latest main tree
        run: |
          git fetch origin main
          {
            echo "main_sha=$(git rev-parse origin/main)"
            echo "main_tree=$(git rev-parse 'origin/main^{tree}')"
          } > /tmp/pr03-main-tree.txt
          cat /tmp/pr03-main-tree.txt
      - uses: actions/upload-artifact@v4
        with:
          name: pr03-main-tree
          path: /tmp/pr03-main-tree.txt
