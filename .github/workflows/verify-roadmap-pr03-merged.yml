name: Verify merged roadmap PR-03

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  verify-pr03:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - run: python -m pip install --requirement requirements.txt
      - run: python -m pip install --requirement requirements-dev.txt
      - run: python -m pip install --no-deps .
      - name: Black
        run: python -m black --check src/providers/rooted_ingestion_pr03.py tests/test_rooted_ingestion_pr03.py
      - name: Mypy
        run: python -m mypy --config-file mypy.ini src/providers/rooted_ingestion_pr03.py
      - name: Focused tests
        run: python -m pytest tests/test_rooted_ingestion_pr03.py -q --disable-socket --allow-unix-socket
      - name: Compile
        run: python -m compileall -q src/providers/rooted_ingestion_pr03.py tests/test_rooted_ingestion_pr03.py
      - name: Repository verification
        run: python scripts/verify_repo.py
