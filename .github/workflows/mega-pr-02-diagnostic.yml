name: MEGA-PR-02 concise repository diagnostic

on:
  pull_request:
    paths:
      - 'src/release_gate/production_paper_qualification.py'
      - 'tests/test_production_paper_qualification.py'
      - '.github/workflows/mega-pr-02-diagnostic.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  concise-repository-verification:
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    env:
      PAPER_TRADING_ONLY: 'true'
      LIVE_TRADING_ENABLED: 'false'
      JITO_ENABLED: 'false'
      KAMINO_LIQUIDATION_ENABLED: 'false'
      PYTHONUNBUFFERED: '1'
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262
        with:
          fetch-depth: 1
          show-progress: false
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: '3.13'
      - name: Install verification dependencies quietly
        run: |
          python -m pip install -q --requirement requirements.txt
          python -m pip install -q --requirement requirements-dev.txt
          python -m pip install -q --no-deps .
      - name: Capture repository verification
        id: verify
        shell: bash
        run: |
          set +e
          python scripts/verify_repo.py > verify.log 2>&1
          status=$?
          printf '%s\n' "$status" > verify.exit
          tail -n 120 verify.log
          exit 0
      - name: Upload diagnostic log
        uses: actions/upload-artifact@v7.0.1
        with:
          name: mega-pr-02-verify-log
          path: |
            verify.log
            verify.exit
          if-no-files-found: error
          retention-days: 1
      - name: Preserve verification exit status
        shell: bash
        run: exit "$(cat verify.exit)"
