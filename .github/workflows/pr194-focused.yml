name: PR-194 focused scheduling checks

on:
  pull_request:
    branches:
      - main
    paths:
      - "src/proof_critical_scheduler_pr194.py"
      - "src/providers/jupiter/scheduler.py"
      - "tests/test_pr194_proof_critical_scheduling.py"
      - ".github/workflows/pr194-focused.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  focused-regressions:
    runs-on: ubuntu-24.04
    env:
      PAPER_TRADING_ONLY: "true"
      LIVE_TRADING_ENABLED: "false"
      JITO_ENABLED: "false"
      KAMINO_LIQUIDATION_ENABLED: "false"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
      - run: python -m pip install --quiet --requirement requirements.txt
      - run: python -m pip install --quiet --requirement requirements-dev.txt
      - run: python -m pip install --quiet --no-deps .
      - name: Compile PR-194 boundary
        run: |
          python -m py_compile \
            src/proof_critical_scheduler_pr194.py \
            src/providers/jupiter/scheduler.py \
            tests/test_pr194_proof_critical_scheduling.py
      - name: Black formatting
        run: |
          python -m black --check \
            src/proof_critical_scheduler_pr194.py \
            src/providers/jupiter/scheduler.py \
            tests/test_pr194_proof_critical_scheduling.py
      - name: PR-194 regressions
        run: python -m pytest tests/test_pr194_proof_critical_scheduling.py -q --disable-socket --allow-unix-socket
