name: MPR-30 cryptographic signer gate

on:
  pull_request:
    paths:
      - "src/mpr30_signer_submission_settlement_gate.py"
      - "tests/test_mpr30_signer_submission_settlement_gate.py"
      - "docs/mpr30_cryptographic_signer_submission_settlement.md"
      - ".github/workflows/mpr30-cryptographic-signer.yml"
  push:
    branches:
      - "mega/mpr-30-*"
    paths:
      - "src/mpr30_signer_submission_settlement_gate.py"
      - "tests/test_mpr30_signer_submission_settlement_gate.py"
      - "docs/mpr30_cryptographic_signer_submission_settlement.md"
      - ".github/workflows/mpr30-cryptographic-signer.yml"

permissions:
  contents: read

concurrency:
  group: mpr30-cryptographic-signer-${{ github.ref }}
  cancel-in-progress: true

jobs:
  signer-submission-settlement-gate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
      - name: Install targeted test dependencies
        run: python -m pip install --disable-pip-version-check pytest==9.0.2
      - name: Compile MPR-30 gate
        run: >-
          python -m py_compile
          src/mpr30_signer_submission_settlement_gate.py
          tests/test_mpr30_signer_submission_settlement_gate.py
      - name: Run MPR-30 adversarial tests
        env:
          PYTHONPATH: .
        run: python -m pytest -q tests/test_mpr30_signer_submission_settlement_gate.py
