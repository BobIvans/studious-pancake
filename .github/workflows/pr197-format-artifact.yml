name: PR-197 formatter artifact

on:
  push:
    branches:
      - pr-197-archive-complete-resubmission

permissions:
  contents: read

jobs:
  format:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - run: python -m pip install --requirement requirements-dev.txt
      - name: Format PR-197 targets
        run: |
          python -m black \
            src/submission/resubmission_proof_pr197.py \
            tests/test_pr197_archive_complete_resubmission.py
      - uses: actions/upload-artifact@v4
        with:
          name: pr197-black-formatted
          path: |
            src/submission/resubmission_proof_pr197.py
            tests/test_pr197_archive_complete_resubmission.py
          if-no-files-found: error
