name: PR-200 diagnostic

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  diagnostic:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Upload source snapshot
        uses: actions/upload-artifact@v4
        with:
          name: pr200-source-snapshot
          path: |
            src/persistence/async_writer_pr200.py
            src/providers/helius/async_delivery_pr200.py
            tests/test_pr200_async_persistence.py
          if-no-files-found: error
