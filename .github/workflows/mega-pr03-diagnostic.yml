name: MEGA-PR-03 diagnostic

on:
  pull_request:
    branches:
      - main
    paths:
      - "src/live_boundary/mega_pr03_live_canary_convergence.py"
      - "tests/test_mega_pr03_live_canary_convergence.py"
      - "docs/mega_pr03_live_canary_convergence.md"
      - ".github/workflows/mega-pr03-diagnostic.yml"

permissions:
  contents: read

jobs:
  capture-verification:
    runs-on: ubuntu-24.04
    env:
      PAPER_TRADING_ONLY: "true"
      LIVE_TRADING_ENABLED: "false"
      JITO_ENABLED: "false"
      KAMINO_LIQUIDATION_ENABLED: "false"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - run: python -m pip install --requirement requirements.txt
      - run: python -m pip install --requirement requirements-dev.txt
      - run: python -m pip install --no-deps .
      - name: Capture repository verification
        id: verify
        shell: bash
        run: |
          set +e
          python scripts/verify_repo.py > mega-pr03-verification.log 2>&1
          status=$?
          echo "exit_code=$status" >> "$GITHUB_OUTPUT"
          tail -n 200 mega-pr03-verification.log
          exit 0
      - uses: actions/upload-artifact@v4
        with:
          name: mega-pr03-verification-log
          path: mega-pr03-verification.log
          if-no-files-found: error
      - name: Preserve failure result
        shell: bash
        run: exit "${{ steps.verify.outputs.exit_code }}"
