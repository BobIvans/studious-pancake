name: PR-02 bootstrap

on:
  push:
    branches: [roadmap/pr-02-unified-lifecycle-authority]
    paths:
      - .github/workflows/pr02-bootstrap.yml
      - .pr02-bootstrap/**
  pull_request:
    branches: [main]

permissions:
  contents: write

concurrency:
  group: pr02-bootstrap
  cancel-in-progress: false

jobs:
  materialize-and-verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: roadmap/pr-02-unified-lifecycle-authority
          fetch-depth: 0
      - name: Merge current main before materialization
        run: |
          git fetch origin main
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git merge --no-edit origin/main
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - name: Materialize reviewed payload
        shell: bash
        run: |
          python - <<'PY'
          from __future__ import annotations

          import base64
          import hashlib
          import io
          from pathlib import Path, PurePosixPath
          import tarfile

          root = Path.cwd().resolve()
          chunks = [
              (root / '.pr02-bootstrap' / f'chunk_{index:02d}').read_text(
                  encoding='utf-8'
              ).strip()
              for index in range(4)
          ]
          archive = base64.b64decode(''.join(chunks), validate=True)
          expected = 'b9ead58405fd37bda4af5b61064672018cfc011d01dbde392ff20f1a8b1bec7d'
          actual = hashlib.sha256(archive).hexdigest()
          if actual != expected:
              raise SystemExit(f'payload digest mismatch: {actual}')

          with tarfile.open(fileobj=io.BytesIO(archive), mode='r:gz') as bundle:
              members = bundle.getmembers()
              for member in members:
                  path = PurePosixPath(member.name)
                  if (
                      path.is_absolute()
                      or '..' in path.parts
                      or member.issym()
                      or member.islnk()
                      or not member.isfile()
                  ):
                      raise SystemExit(f'unsafe payload member: {member.name}')
              for member in members:
                  source = bundle.extractfile(member)
                  if source is None:
                      raise SystemExit(f'missing payload bytes: {member.name}')
                  target = (root / member.name).resolve()
                  if root not in target.parents:
                      raise SystemExit(f'payload escapes repository: {member.name}')
                  target.parent.mkdir(parents=True, exist_ok=True)
                  target.write_bytes(source.read())
          PY
      - name: Preserve current-main quality manifests
        run: |
          git show origin/main:mypy.ini > mypy.ini
          python - <<'PY'
          from pathlib import Path
          path = Path('mypy.ini')
          text = path.read_text()
          text = text.replace(
              '    src/data_plane,\n',
              '    src/data_plane,\n    src/durability/unified_authority_pr02.py,\n',
          )
          path.write_text(text)
          PY
          git show origin/main:config/format_targets.txt > config/format_targets.txt
          printf '%s\n' \
            'src/durability/unified_authority_pr02.py' \
            'tests/test_pr02_unified_lifecycle_authority.py' \
            'src/paper_shadow/durable_service_a3.py' >> config/format_targets.txt
      - run: python -m pip install --requirement requirements.txt
      - run: python -m pip install --requirement requirements-dev.txt
      - name: Format PR-02 files
        run: |
          python -m black \
            src/durability/unified_authority_pr02.py \
            src/durability/__init__.py \
            src/paper_shadow/durable_service_a3.py \
            tests/test_pr02_unified_lifecycle_authority.py
      - name: Focused PR-02 verification
        run: |
          python -m pytest -q \
            tests/test_pr02_unified_lifecycle_authority.py \
            tests/test_mega_pr_a3_installed_durable_paper_service.py \
            tests/test_mega_pr_b3_rooted_recovery.py \
            tests/test_pr182_trusted_time.py \
            tests/test_pr191_immutable_lifecycle_accounting.py
          python -m mypy --config-file mypy.ini \
            src/durability/unified_authority_pr02.py
          python -m compileall -q src tests
      - name: Publish clean implementation commit
        shell: bash
        run: |
          rm -rf .pr02-bootstrap .github/workflows/pr02-bootstrap.yml
          git add -A
          git diff --cached --check
          git commit -m "Roadmap PR-02: unify lifecycle handoff and terminal authority"
          git push origin HEAD:roadmap/pr-02-unified-lifecycle-authority
