name: PR-200 continuous paper-shadow checks

on:
  pull_request:
    branches:
      - main
    paths:
      - "src/paper_shadow/continuous_pr200.py"
      - "tests/test_pr200_continuous_paper_shadow.py"
      - "docs/roadmap/pr200_continuous_sender_free_paper_shadow.md"
      - ".github/workflows/pr200-continuous-paper-shadow.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  focused-regressions:
    runs-on: ubuntu-24.04
    env:
      PAPER_TRADING_ONLY: "true"
      LIVE_TRADING_ENABLED: "false"
      JITO_ENABLED: "false"
      KAMINO_LIQUIDATION_ENABLED: "false"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
      - run: python -m pip install --quiet --requirement requirements.txt
      - run: python -m pip install --quiet --requirement requirements-dev.txt
      - run: python -m pip install --quiet --no-deps .
      - name: Compile PR-200 boundary
        run: |
          python -m py_compile \
            src/paper_shadow/continuous_pr200.py \
            tests/test_pr200_continuous_paper_shadow.py
      - name: PR-200 regressions
        run: python -m pytest tests/test_pr200_continuous_paper_shadow.py -q --disable-socket --allow-unix-socket
