name: PR-117 asset mint registry

on:
  pull_request:
    paths:
      - "src/asset_mint_registry_pr117.py"
      - "src/resources/asset_mint_registry_pr117.json"
      - "tests/test_pr117_asset_mint_registry.py"
      - ".github/workflows/pr117-asset-mint-registry.yml"
  push:
    branches:
      - "pr-117-asset-mint-token2022-safety"

permissions:
  contents: read

jobs:
  focused:
    runs-on: ubuntu-latest
    env:
      PAPER_TRADING_ONLY: "true"
      LIVE_TRADING: "false"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13.13"
      - run: python -m pip install --upgrade pip
      - run: python -m pip install --requirement requirements.txt
      - run: python -m pip install --requirement requirements-dev.txt
      - run: python -m pip install --no-deps .
      - name: Black
        run: >-
          python -m black --check
          src/asset_mint_registry_pr117.py
          tests/test_pr117_asset_mint_registry.py
      - name: Focused PR-117 tests
        run: >-
          python -m pytest
          tests/test_pr117_asset_mint_registry.py
          -q --disable-socket --allow-unix-socket
      - name: Compile
        run: >-
          python -m compileall -q
          src/asset_mint_registry_pr117.py
          tests/test_pr117_asset_mint_registry.py
      - name: PR-117 registry gate
        run: >-
          python -m src.asset_mint_registry_pr117
          --repo-root .
          --json
