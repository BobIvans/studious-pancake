name: PR-199 production operations

on:
  pull_request:
    branches:
      - main
    paths:
      - "src/production_operations_pr199.py"
      - "tests/test_pr199_production_operations.py"
      - "docs/pr199_operations_release_dr_evidence.md"
      - ".github/workflows/pr199-production-operations.yml"
  push:
    branches:
      - roadmap-pr-199-operations-release-dr-evidence
  workflow_dispatch:

permissions:
  contents: read

jobs:
  production-operations:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    env:
      PAPER_TRADING_ONLY: "true"
      LIVE_TRADING_ENABLED: "false"
      JITO_ENABLED: "false"
      KAMINO_LIQUIDATION_ENABLED: "false"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
      - name: Install dependencies
        run: |
          python -m pip install --requirement requirements.txt
          python -m pip install --requirement requirements-dev.txt
          python -m pip install --no-deps .
      - name: Compile PR-199 boundary
        run: |
          python -m compileall -q \
            src/production_operations_pr199.py \
            tests/test_pr199_production_operations.py
      - name: Critical static errors
        run: |
          python -m flake8 \
            src/production_operations_pr199.py \
            tests/test_pr199_production_operations.py \
            --count --select=E9,F63,F7,F82 --show-source --statistics
      - name: Focused regression suite
        run: |
          python -m pytest \
            tests/test_pr199_production_operations.py \
            -q --disable-socket --allow-unix-socket
