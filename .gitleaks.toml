title = "studious-pancake PR-112 secret scanning rules"

[[rules]]
id = "generic-secret-field"
description = "Generic secret-bearing field with literal non-reference value"
regex = '''(?i)(api[_-]?key|access[_-]?token|auth[_-]?token|bearer[_-]?token|client[_-]?secret|secret|passphrase|password)\s*[:=]\s*["']?[A-Za-z0-9+/=_-]*[0-9][A-Za-z0-9+/=_-]{19,}["']?'''
keywords = ["api_key", "token", "secret", "passphrase", "password"]

[[rules]]
id = "google-api-key"
description = "Google-style API key"
regex = '''AIza[0-9A-Za-z_-]{20,}'''
keywords = ["AIza"]

[[rules]]
id = "openai-style-secret-key"
description = "OpenAI-compatible sk-prefixed token"
regex = '''sk-[A-Za-z0-9_-]{20,}'''
keywords = ["sk-"]

[[rules]]
id = "github-token"
description = "GitHub token"
regex = '''gh[pousr]_[0-9A-Za-z_]{20,}'''
keywords = ["ghp_", "gho_", "ghu_", "ghs_", "ghr_"]

[allowlist]
description = "Allow documented low-risk placeholders in sanitized offline provider fixtures only. Do not allowlist credential-shaped root configs or tests."
paths = [
  '''tests/fixtures/providers/.*_sanitized\.json''',
]
regexes = [
  '''USDC_MINT_FIXTURE''',
  '''WSOL_MINT_FIXTURE''',
  '''JUPITER_PROGRAM_FIXTURE''',
]
