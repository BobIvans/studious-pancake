name: MEGA-PR-01 canonical paper platform

on:
  pull_request:
    paths:
      - "arb_bot.py"
      - "src/cli_pr189.py"
      - "src/canonical_paper/**"
      - "src/resources/paper_recorded_cycle.json"
      - "tests/test_mega_pr01_canonical_paper_platform.py"
      - "docs/mega_pr01_canonical_paper_platform.md"
      - ".github/workflows/mega-pr01-canonical-paper-platform.yml"
  workflow_dispatch:

permissions:
  contents: read

env:
  PAPER_TRADING_ONLY: "true"
  LIVE_TRADING_ENABLED: "false"
  JITO_ENABLED: "false"
  KAMINO_LIQUIDATION_ENABLED: "false"
  PYTHONPATH: "."

jobs:
  canonical-paper-platform:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install focused test dependencies
        run: |
          python -m pip install pytest==9.0.2
          python -m pip install pytest-asyncio==1.3.0
      - name: Compile safety surface
        run: |
          python -m compileall -q \
            src/canonical_paper \
            src/cli_pr189.py \
            arb_bot.py \
            tests/test_mega_pr01_canonical_paper_platform.py
      - name: Run focused tests
        run: python -m pytest -q tests/test_mega_pr01_canonical_paper_platform.py
      - name: Verify optimized mode keeps safety checks
        run: |
          python -O -m pytest -q \
            tests/test_mega_pr01_canonical_paper_platform.py \
            -k "message_simulation_mutation or repayment_formula or rooted_slot_skew"
