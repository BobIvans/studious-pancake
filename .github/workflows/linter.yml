name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

env:
  PAPER_TRADING_ONLY: "true"
  LIVE_TRADING_ENABLED: "false"
  JITO_ENABLED: "false"
  KAMINO_LIQUIDATION_ENABLED: "false"

jobs:
  verify:
    name: Repository verification
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13.13"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt
      - run: python -m pip install --requirement requirements.txt
      - run: python -m pip install --requirement requirements-dev.txt
      - run: python -m pip install --no-deps .
      - name: Run repository verification
        run: |
          set +e
          python scripts/verify_repo.py > /tmp/repository-verification.log 2>&1
          status=$?
          tail -n 120 /tmp/repository-verification.log
          exit "$status"
      - name: Upload repository verification log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: repository-verification-log
          path: /tmp/repository-verification.log
          if-no-files-found: error
          retention-days: 1

  package-smoke:
    name: Wheel and console smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13.13"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt
      - run: python -m pip install --requirement requirements.txt
      - run: python -m pip install --requirement requirements-dev.txt
      - run: python scripts/package_smoke.py

  container-smoke:
    name: Non-root runtime image smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: bash scripts/image_smoke.sh

  secret-scan:
    name: Secret scanning
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
