name: mpr-close-03-provider-protocol

on:
  pull_request:
    paths:
      - 'src/mpr_close_03_verifiers.py'
      - 'src/resources/external_contracts.json'
      - 'src/resources/kamino_supported_combinations.json'
      - 'src/providers/helius/**'
      - 'src/providers/jupiter/**'
      - 'scripts/verify_solana_v0_alt_conformance.py'
      - 'scripts/verify_external_contracts.py'
      - 'scripts/verify_provider_drift_probes.py'
      - 'tests/test_mpr_close_03_verifiers.py'
      - '.github/workflows/mpr-close-03-provider-protocol.yml'
  workflow_dispatch:

jobs:
  verify-provider-protocol:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Compile verifier layer
        run: |
          python -m py_compile \
            src/mpr_close_03_verifiers.py \
            scripts/verify_solana_v0_alt_conformance.py \
            scripts/verify_external_contracts.py \
            scripts/verify_provider_drift_probes.py \
            tests/test_mpr_close_03_verifiers.py
      - name: Solana v0 ALT verifier
        run: python scripts/verify_solana_v0_alt_conformance.py --json
      - name: External contracts verifier
        run: python scripts/verify_external_contracts.py --json
      - name: Provider drift probes verifier
        run: python scripts/verify_provider_drift_probes.py --offline-fixtures --json
      - name: Focused tests
        run: python -m pytest -q tests/test_mpr_close_03_verifiers.py