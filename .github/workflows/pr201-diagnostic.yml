name: PR201 apply formatting

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  apply-black-and-remove-diagnostics:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
      - name: Install formatter
        run: python -m pip install --requirement requirements-dev.txt
      - name: Apply exact formatter result
        run: python -m black src/authorization_replay_pr201.py
      - name: Remove temporary diagnostics and push fix
        shell: bash
        run: |
          rm .github/workflows/pr201-diagnostic.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/authorization_replay_pr201.py .github/workflows/pr201-diagnostic.yml
          git commit -m "PR-201: apply Black formatting and remove diagnostics"
          git push origin "HEAD:${{ github.head_ref }}"
