name: PR-196 external protocol conformance checks

on:
  pull_request:
    branches:
      - main
    paths:
      - "src/protocol_conformance_pr196.py"
      - "tests/test_pr196_external_protocol_conformance.py"
      - "docs/roadmap/pr196_external_protocol_conformance.md"
      - ".github/workflows/pr196-external-protocol-conformance.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  focused-regressions:
    runs-on: ubuntu-24.04
    env:
      PAPER_TRADING_ONLY: "true"
      LIVE_TRADING_ENABLED: "false"
      JITO_ENABLED: "false"
      KAMINO_LIQUIDATION_ENABLED: "false"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
      - run: python -m pip install --quiet --requirement requirements.txt
      - run: python -m pip install --quiet --requirement requirements-dev.txt
      - run: python -m pip install --quiet --no-deps .
      - name: Compile PR-196 boundary
        run: |
          python -m py_compile \
            src/protocol_conformance_pr196.py \
            tests/test_pr196_external_protocol_conformance.py
      - name: PR-196 regressions
        run: python -m pytest tests/test_pr196_external_protocol_conformance.py -q --disable-socket --allow-unix-socket
