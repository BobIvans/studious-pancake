name: PR-194 package smoke diagnostic

on:
  push:
    branches:
      - pr-194-hermetic-supply-chain-baseline
    paths:
      - ".github/workflows/pr194-package-smoke-diagnostic.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  diagnose:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: pr-194-hermetic-supply-chain-baseline
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - run: python -m pip install --requirement requirements.txt
      - run: python -m pip install --requirement requirements-dev.txt
      - name: Run package smoke and commit log on failure
        run: |
          mkdir -p diagnostics
          set +e
          python scripts/package_smoke.py > diagnostics/pr194-package-smoke.log 2>&1
          status=$?
          set -e
          if [ "$status" -eq 0 ]; then
            echo "package smoke passed"
            rm -f diagnostics/pr194-package-smoke.log
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add diagnostics/pr194-package-smoke.log
          git commit -m "PR-194 capture package smoke diagnostic"
          git push origin HEAD:pr-194-hermetic-supply-chain-baseline
          exit "$status"
