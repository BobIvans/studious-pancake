name: PR-206 verification diagnostics

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  capture-verification-tail:
    if: github.head_ref == 'pr-206-durable-time-semantic-replay'
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    env:
      PAPER_TRADING_ONLY: "true"
      LIVE_TRADING_ENABLED: "false"
      JITO_ENABLED: "false"
      KAMINO_LIQUIDATION_ENABLED: "false"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
      - name: Install dependencies
        run: |
          python -m pip install --requirement requirements.txt
          python -m pip install --requirement requirements-dev.txt
          python -m pip install --no-deps .
      - name: Capture repository verification
        shell: bash
        run: |
          set +e
          python scripts/verify_repo.py > pr206-verify.log 2>&1
          status=$?
          tail -n 500 pr206-verify.log > pr206-verify-tail.log
          printf '%s\n' "$status" > pr206-exit-status.txt
          exit 0
      - uses: actions/upload-artifact@v4
        with:
          name: pr206-verification-diagnostics
          path: |
            pr206-verify-tail.log
            pr206-exit-status.txt
          if-no-files-found: error
          retention-days: 1
