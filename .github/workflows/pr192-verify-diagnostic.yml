name: PR-192 verify diagnostic

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  capture:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
      - run: python -m pip install --requirement requirements.txt
      - run: python -m pip install --requirement requirements-dev.txt
      - run: python -m pip install --no-deps .
      - name: Capture repository verification
        shell: bash
        run: python scripts/verify_repo.py > /tmp/pr192-verify.txt 2>&1 || true
      - uses: actions/upload-artifact@v4
        with:
          name: pr192-verify-diagnostic
          path: /tmp/pr192-verify.txt
          if-no-files-found: error
          retention-days: 1
