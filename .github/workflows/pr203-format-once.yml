name: PR-203 format once

on:
  push:
    branches:
      - roadmap-pr-203-final-promotion-governance
    paths:
      - ".github/workflows/pr203-format-once.yml"

permissions:
  contents: write

jobs:
  format-once:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: roadmap-pr-203-final-promotion-governance
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install formatter
        run: |
          python -m pip install --requirement requirements-dev.txt
      - name: Format and remove temporary workflow
        run: |
          python -m black \
            src/release_gate/final_promotion_governance_pr203.py \
            tests/test_pr203_final_promotion_governance.py
          rm .github/workflows/pr203-format-once.yml
      - name: Commit formatted files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            src/release_gate/final_promotion_governance_pr203.py \
            tests/test_pr203_final_promotion_governance.py \
            .github/workflows/pr203-format-once.yml
          if git diff --cached --quiet; then
            echo "nothing to format"
            exit 0
          fi
          git commit -m "PR-203: format final promotion governance files"
          git push origin HEAD:roadmap-pr-203-final-promotion-governance
