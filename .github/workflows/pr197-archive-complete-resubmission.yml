name: PR-197 archive-complete resubmission proof

on:
  pull_request:
    branches:
      - main
    paths:
      - "src/submission/resubmission_proof_pr197.py"
      - "tests/test_pr197_archive_complete_resubmission.py"
      - "docs/pr197_archive_complete_resubmission.md"
      - "config/format_targets.txt"
      - ".github/workflows/pr197-archive-complete-resubmission.yml"
  push:
    branches:
      - pr-197-archive-complete-resubmission

permissions:
  contents: read

jobs:
  focused-verification:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - run: python -m pip install --requirement requirements.txt
      - run: python -m pip install --requirement requirements-dev.txt
      - run: python -m pip install --no-deps .
      - name: Black
        run: |
          python -m black --check \
            src/submission/resubmission_proof_pr197.py \
            tests/test_pr197_archive_complete_resubmission.py
      - name: Mypy
        run: python -m mypy --config-file mypy.ini src/submission/resubmission_proof_pr197.py
      - name: Focused tests
        run: |
          python -m pytest \
            tests/test_pr197_archive_complete_resubmission.py \
            -q --disable-socket --allow-unix-socket
      - name: Compile
        run: |
          python -m compileall -q \
            src/submission/resubmission_proof_pr197.py \
            tests/test_pr197_archive_complete_resubmission.py
