name: PR08 repository verification diagnostic

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  capture-verification:
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    env:
      PAPER_TRADING_ONLY: "true"
      LIVE_TRADING_ENABLED: "false"
      JITO_ENABLED: "false"
      KAMINO_LIQUIDATION_ENABLED: "false"
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
      - name: Install repository requirements
        run: |
          python -m pip install --requirement requirements.txt
          python -m pip install --requirement requirements-dev.txt
          python -m pip install --no-deps .
      - name: Capture repository verification
        id: verification
        shell: bash
        run: |
          set +e
          python scripts/verify_repo.py > pr08-verification.log 2>&1
          status=$?
          echo "exit_code=${status}" >> "$GITHUB_OUTPUT"
          cat pr08-verification.log
          exit 0
      - name: Upload repository verification log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pr08-verification-log
          path: pr08-verification.log
          if-no-files-found: error
          retention-days: 1
      - name: Preserve verification result
        if: always()
        run: exit "${{ steps.verification.outputs.exit_code }}"
