name: PR-195 durable lifecycle

on:
  pull_request:
    branches:
      - main
    paths:
      - "src/production_lifecycle_pr195.py"
      - "tests/test_pr195_production_lifecycle.py"
      - "docs/pr195_durable_lifecycle_recovery_gate.md"
      - ".github/workflows/pr195-durable-lifecycle.yml"
  push:
    branches:
      - roadmap-pr-195-durable-lifecycle-recovery-gate
  workflow_dispatch:

permissions:
  contents: read

jobs:
  durable-lifecycle:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    env:
      PAPER_TRADING_ONLY: "true"
      LIVE_TRADING_ENABLED: "false"
      JITO_ENABLED: "false"
      KAMINO_LIQUIDATION_ENABLED: "false"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
      - name: Install dependencies
        run: |
          python -m pip install --requirement requirements.txt
          python -m pip install --requirement requirements-dev.txt
          python -m pip install --no-deps .
      - name: Compile PR-195 boundary
        run: |
          python -m compileall -q \
            src/production_lifecycle_pr195.py \
            tests/test_pr195_production_lifecycle.py
      - name: Critical static errors
        run: |
          python -m flake8 \
            src/production_lifecycle_pr195.py \
            tests/test_pr195_production_lifecycle.py \
            --count --select=E9,F63,F7,F82 --show-source --statistics
      - name: Focused regression suite
        run: |
          python -m pytest \
            tests/test_pr195_production_lifecycle.py \
            -q --disable-socket --allow-unix-socket
