name: MEGA-PR-01 canonical paper platform

on:
  pull_request:
    paths:
      - "arb_bot.py"
      - "src/cli_pr189.py"
      - "src/canonical_paper/**"
      - "src/resources/paper_recorded_cycle.json"
      - "tests/test_mega_pr01_canonical_paper_platform.py"
      - "docs/mega_pr01_canonical_paper_platform.md"
      - ".github/workflows/mega-pr01-canonical-paper-platform.yml"
  workflow_dispatch:

permissions:
  contents: read

env:
  PAPER_TRADING_ONLY: "true"
  LIVE_TRADING_ENABLED: "false"
  JITO_ENABLED: "false"
  KAMINO_LIQUIDATION_ENABLED: "false"

jobs:
  canonical-paper-platform:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install focused test dependency
        run: python -m pip install pytest==9.0.2
      - name: Compile safety surface
        run: |
          python -m compileall -q \
            src/canonical_paper \
            src/cli_pr189.py \
            arb_bot.py \
            tests/test_mega_pr01_canonical_paper_platform.py
      - name: Run focused tests
        run: python -m pytest -q tests/test_mega_pr01_canonical_paper_platform.py
      - name: Verify optimized mode keeps safety checks
        run: |
          python -O -m pytest -q \
            tests/test_mega_pr01_canonical_paper_platform.py \
            -k "message_simulation_mutation or repayment_formula or rooted_slot_skew"

  repository-verification-diagnostics:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install repository dependencies
        run: |
          python -m pip install --requirement requirements.txt
          python -m pip install --requirement requirements-dev.txt
          python -m pip install --no-deps .
      - name: Verify dependency consistency
        run: python -m pip check
      - name: Run quality gate
        run: python scripts/quality_gate.py --with-dependency-audit
      - name: Validate authority map
        run: python scripts/validate_authority_map.py
      - name: Run package smoke
        run: python scripts/package_smoke.py
      - name: Verify PR-194 required controls
        run: python scripts/verify_pr194_required_controls.py
      - name: Verify PR-194 trusted foundation
        run: python scripts/verify_pr194_trusted_foundation.py --json
      - name: Verify PR-200 production cutover
        run: python scripts/verify_pr200_production_cutover.py --json
      - name: Verify PR-206 durable state
        run: python scripts/verify_pr206_durable_state.py --json
      - name: Compile repository
        run: python -m compileall -q arb_bot.py src scripts tests
      - name: Smoke root status
        run: python arb_bot.py status --json
      - name: Smoke root capabilities
        run: python arb_bot.py capabilities --json
      - name: Run mandatory focused suite
        run: |
          python -m pytest \
            tests/test_pr01_authority_map.py \
            tests/test_pr023_runtime_truth.py \
            tests/test_launcher_startup_smoke.py \
            tests/test_import_smoke.py \
            tests/test_quality_quarantine.py \
            tests/test_pr087_package_boundary.py \
            tests/test_pr101_marginfi_complete_protocol_evidence.py \
            tests/test_pr106_canonical_sender_lifecycle_disabled.py \
            tests/test_pr115_simulation_owned_economic_proof.py \
            tests/test_pr116_coherent_marginfi_snapshot_oracle.py \
            tests/test_pr121_single_durable_lifecycle_truth.py \
            tests/test_pr120_secret_resolver_config_jito.py \
            tests/test_pr125_lst_governance_policy.py \
            tests/test_pr136_rooted_rpc_quorum.py \
            tests/test_pr140_data_lineage_quarantine.py \
            tests/test_pr194_trusted_foundation.py \
            tests/test_pr195_durable_webhook_intake.py \
            tests/test_pr200_production_cutover.py \
            tests/test_pr195_durable_kernel_v3.py \
            tests/test_pr206_durable_state.py \
            -q --disable-socket --allow-unix-socket
      - name: Run complete non-live suite
        run: |
          python -m pytest -m "not live and not manual" \
            --disable-socket --allow-unix-socket -q
      - name: Require clean source tree
        run: test -z "$(git status --porcelain)"
