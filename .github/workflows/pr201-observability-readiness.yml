name: PR-201 observability readiness deployment

on:
  pull_request:
    branches:
      - main
    paths:
      - "src/operations/pr201_observability_readiness.py"
      - "tests/test_pr201_observability_readiness.py"
      - "docs/pr201_observability_readiness_deployment.md"
      - ".github/workflows/pr201-observability-readiness.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  focused-verification:
    runs-on: ubuntu-24.04
    env:
      PAPER_TRADING_ONLY: "true"
      LIVE_TRADING_ENABLED: "false"
      JITO_ENABLED: "false"
      KAMINO_LIQUIDATION_ENABLED: "false"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
      - run: python -m pip install --quiet --requirement requirements.txt
      - run: python -m pip install --quiet --requirement requirements-dev.txt
      - run: python -m pip install --quiet --no-deps .
      - name: Focused PR-201 regressions
        run: |
          python -m pytest -q tests/test_pr201_observability_readiness.py \
            --disable-socket --allow-unix-socket
      - name: Compile
        run: |
          python -m py_compile \
            src/operations/pr201_observability_readiness.py \
            tests/test_pr201_observability_readiness.py
