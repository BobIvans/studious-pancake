name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read
  pull-requests: write

env:
  PAPER_TRADING_ONLY: "true"
  LIVE_TRADING_ENABLED: "false"
  JITO_ENABLED: "false"
  KAMINO_LIQUIDATION_ENABLED: "false"

jobs:
  verify:
    name: Repository verification
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13.13"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt
      - run: python -m pip install --requirement requirements.txt
      - run: python -m pip install --requirement requirements-dev.txt
      - run: python -m pip install --no-deps .
      - name: Dependency consistency
        run: python -m pip check
      - name: Static, format, type, security and dependency audit
        run: python scripts/quality_gate.py --with-dependency-audit
      - name: Compile all supported Python
        run: python -m compileall -q arb_bot.py src scripts tests
      - name: Runtime status smoke
        run: python arb_bot.py status --json
      - name: Capability matrix smoke
        run: python arb_bot.py capabilities --json
      - name: Launcher and quarantine tests
        run: python -m pytest tests/test_pr023_runtime_truth.py tests/test_launcher_startup_smoke.py tests/test_import_smoke.py tests/test_quality_quarantine.py -q --disable-socket --allow-unix-socket
      - name: Full offline test suite
        id: full_tests
        continue-on-error: true
        run: python -m pytest -m "not live and not manual" --disable-socket --allow-unix-socket -q --junitxml=pytest-full-suite.xml
      - name: Upload full-suite JUnit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pytest-full-suite
          path: pytest-full-suite.xml
          if-no-files-found: error
      - name: Publish failing test names
        if: always() && github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          python - <<'PY'
          from pathlib import Path
          import xml.etree.ElementTree as ET

          report = Path("pytest-full-suite.xml")
          lines = ["<!-- pr027-pytest-diagnostic -->", "### PR-027 full-suite diagnostic"]
          if not report.exists():
              lines.append("JUnit report was not produced.")
          else:
              root = ET.parse(report).getroot()
              failed = []
              for case in root.iter("testcase"):
                  node = case.find("failure")
                  if node is None:
                      node = case.find("error")
                  if node is None:
                      continue
                  test_id = f"{case.get('classname', '')}::{case.get('name', '')}".strip(":")
                  message = (node.get("message") or "failure").replace("\n", " ")
                  failed.append((test_id, message[:500]))
              if failed:
                  lines.append(f"Failing tests: **{len(failed)}**")
                  for test_id, message in failed:
                      lines.append(f"- `{test_id}` — {message}")
              else:
                  lines.append("No failing testcases were present in the JUnit report.")
          Path("pytest-failures.md").write_text("\n".join(lines) + "\n", encoding="utf-8")
          PY
          gh pr comment "${{ github.event.pull_request.number }}" --body-file pytest-failures.md
      - name: Enforce full-suite result
        if: steps.full_tests.outcome == 'failure'
        run: exit 1

  package-smoke:
    name: Wheel and console smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13.13"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt
      - run: python -m pip install --requirement requirements.txt
      - run: python -m pip install --requirement requirements-dev.txt
      - run: python scripts/package_smoke.py

  container-smoke:
    name: Non-root runtime image smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: bash scripts/image_smoke.sh

  secret-scan:
    name: Secret scanning
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
