name: PR-215 typed config time dependency gate

on:
  pull_request:
    paths:
      - 'src/pr215_typed_config_time_dependency.py'
      - 'tests/test_pr215_typed_config_time_dependency.py'
      - 'docs/pr215_typed_config_time_dependency_gate.md'
      - '.github/workflows/pr215-typed-config-time-dependency.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  pr215-typed-config-time-dependency:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - name: Install focused test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install pytest flake8
      - name: Compile focused PR-215 gate
        run: |
          python -m compileall -q \
            src/pr215_typed_config_time_dependency.py \
            tests/test_pr215_typed_config_time_dependency.py
      - name: Critical lint focused PR-215 gate
        run: |
          python -m flake8 \
            --select=E9,F63,F7,F82 \
            src/pr215_typed_config_time_dependency.py \
            tests/test_pr215_typed_config_time_dependency.py
      - name: Run focused PR-215 tests
        run: PYTHONPATH=. python -m pytest -q tests/test_pr215_typed_config_time_dependency.py
