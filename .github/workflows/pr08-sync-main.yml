name: PR08 sync current main

on:
  push:
    branches:
      - roadmap/pr-08-isolated-signer-submission-foundation

permissions:
  contents: write

jobs:
  sync-main:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: roadmap/pr-08-isolated-signer-submission-foundation
          fetch-depth: 0
      - name: Merge current main and preserve PR-08 format targets
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin main
          set +e
          git merge --no-ff --no-commit origin/main
          merge_status=$?
          set -e
          if [ "$merge_status" -ne 0 ]; then
            conflicts="$(git diff --name-only --diff-filter=U)"
            if [ "$conflicts" != "config/format_targets.txt" ]; then
              echo "Unexpected conflicts: $conflicts" >&2
              exit 1
            fi
            git checkout origin/main -- config/format_targets.txt
            for target in \
              isolated_signer_service/src/flashloan_isolated_signer/__init__.py \
              isolated_signer_service/src/flashloan_isolated_signer/models.py \
              isolated_signer_service/src/flashloan_isolated_signer/store.py \
              isolated_signer_service/src/flashloan_isolated_signer/boundary.py \
              isolated_signer_service/src/flashloan_isolated_signer/service.py \
              tests/test_roadmap_pr08_isolated_signer_foundation.py
            do
              grep -qxF "$target" config/format_targets.txt || echo "$target" >> config/format_targets.txt
            done
            git add config/format_targets.txt
          fi
          rm .github/workflows/pr08-sync-main.yml
          git add .github/workflows/pr08-sync-main.yml
          git commit -m "Merge current main into roadmap PR-08 foundation"
          git push origin HEAD:roadmap/pr-08-isolated-signer-submission-foundation
