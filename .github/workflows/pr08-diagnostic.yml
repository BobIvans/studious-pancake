name: PR08 apply exact formatting

on:
  push:
    branches:
      - roadmap/pr-08-isolated-signer-submission-foundation

permissions:
  contents: write

jobs:
  apply-formatting:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: roadmap/pr-08-isolated-signer-submission-foundation
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
      - name: Install formatter
        run: python -m pip install --requirement requirements-dev.txt
      - name: Apply Black and remove temporary workflow
        shell: bash
        run: |
          set -euo pipefail
          python -m black isolated_signer_service/src/flashloan_isolated_signer/store.py
          rm .github/workflows/pr08-diagnostic.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add isolated_signer_service/src/flashloan_isolated_signer/store.py
          git add .github/workflows/pr08-diagnostic.yml
          git commit -m "PR-08: apply repository formatter"
          git push origin HEAD:roadmap/pr-08-isolated-signer-submission-foundation
