name: PR-091 real evidence manifest

on:
  pull_request:
    paths:
      - "src/release_gate/actual_evidence.py"
      - "src/release_gate/operational_drills.py"
      - "src/release_gate/real_evidence_manifest.py"
      - "src/release_gate/__init__.py"
      - "release_artifacts/pr091/**"
      - "tests/test_pr091_real_evidence_manifest.py"
      - ".github/workflows/pr091-real-evidence.yml"
  push:
    branches:
      - "pr-091-real-security-sbom-chaos-evidence"

permissions:
  contents: read

jobs:
  focused:
    runs-on: ubuntu-latest
    env:
      PAPER_TRADING_ONLY: "true"
      LIVE_TRADING: "false"
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13.13"
      - run: python -m pip install --upgrade pip
      - run: python -m pip install --requirement requirements.txt
      - run: python -m pip install --requirement requirements-dev.txt
      - run: python -m pip install --no-deps .
      - name: Black
        run: >-
          python -m black --check
          src/release_gate/real_evidence_manifest.py
          src/release_gate/__init__.py
          tests/test_pr091_real_evidence_manifest.py
      - name: Focused PR-091 tests
        run: >-
          python -m pytest
          tests/test_pr091_real_evidence_manifest.py
          -q --disable-socket --allow-unix-socket
      - name: Compile
        run: >-
          python -m compileall -q
          src/release_gate/real_evidence_manifest.py
          tests/test_pr091_real_evidence_manifest.py
