name: MEGA-PR-02 economic proof qualification

on:
  pull_request:
    paths:
      - "src/execution/economic_reconciliation/mega_pr02_proof.py"
      - "tests/execution/test_mega_pr02_economic_proof.py"
      - "docs/mega_pr02_economic_proof_qualification.md"
      - ".github/workflows/mega-pr02-economic-proof.yml"
  push:
    branches:
      - "mega-pr-02-*"
    paths:
      - "src/execution/economic_reconciliation/mega_pr02_proof.py"
      - "tests/execution/test_mega_pr02_economic_proof.py"
      - "docs/mega_pr02_economic_proof_qualification.md"
      - ".github/workflows/mega-pr02-economic-proof.yml"

permissions:
  contents: write

concurrency:
  group: mega-pr02-economic-proof-${{ github.ref }}
  cancel-in-progress: true

env:
  PAPER_TRADING_ONLY: "true"
  LIVE_TRADING_ENABLED: "false"
  JITO_ENABLED: "false"
  PYTHONPATH: "."

jobs:
  economic-proof-contract:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: mega-pr-02-economic-proof-qualification
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
      - name: Install focused test dependencies
        run: |
          python -m pip install --disable-pip-version-check \
            pytest==9.0.2 \
            mypy==1.18.2 \
            solders==0.28.0
      - name: Apply explicit observation variable names
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path("src/execution/economic_reconciliation/mega_pr02_proof.py")
          source = path.read_text(encoding="utf-8")
          old = '''    def _bind_decoded_state(
              self,
              evidence: ReconciliationEvidence,
              raw_accounts: dict[str, RawAccountBinding],
          ) -> None:
              for observation in evidence.native:
                  self._require_decoded_hash(
                      raw_accounts[observation.address], decoded_observation_hash(observation)
                  )
              for observation in evidence.tokens:
                  self._require_decoded_hash(
                      raw_accounts[observation.address], decoded_observation_hash(observation)
                  )
          '''
          new = '''    def _bind_decoded_state(
              self,
              evidence: ReconciliationEvidence,
              raw_accounts: dict[str, RawAccountBinding],
          ) -> None:
              for native_observation in evidence.native:
                  self._require_decoded_hash(
                      raw_accounts[native_observation.address],
                      decoded_observation_hash(native_observation),
                  )
              for token_observation in evidence.tokens:
                  self._require_decoded_hash(
                      raw_accounts[token_observation.address],
                      decoded_observation_hash(token_observation),
                  )
          '''
          if old in source:
              path.write_text(source.replace(old, new, 1), encoding="utf-8")
          else:
              print("mypy variable fix already applied")
          PY
      - name: Compile MEGA-PR-02 proof boundary
        run: |
          python -m py_compile \
            src/execution/economic_reconciliation/mega_pr02_proof.py \
            tests/execution/test_mega_pr02_economic_proof.py
      - name: Type-check MEGA-PR-02 proof boundary
        run: python -m mypy --config-file mypy.ini src/execution/economic_reconciliation/mega_pr02_proof.py
      - name: Run MEGA-PR-02 proof tests
        run: python -m pytest -q tests/execution/test_mega_pr02_economic_proof.py
      - name: Commit verified mypy fix
        run: |
          if git diff --quiet -- src/execution/economic_reconciliation/mega_pr02_proof.py; then
            echo "No source changes to commit"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/execution/economic_reconciliation/mega_pr02_proof.py
          git commit -m "MEGA-PR-02: make decoded binding mypy-clean"
          git push origin HEAD:mega-pr-02-economic-proof-qualification
