name: MPR-19 durable economic authority

on:
  pull_request:
    paths:
      - "src/durability/mpr19_economic_authority.py"
      - "tests/test_mpr19_economic_authority.py"
      - "docs/mpr19_durable_economic_authority.md"
      - ".github/workflows/mpr19-durable-economic-authority.yml"
  workflow_dispatch:

permissions:
  contents: read

env:
  PAPER_TRADING_ONLY: "true"
  LIVE_TRADING_ENABLED: "false"
  JITO_ENABLED: "false"
  KAMINO_LIQUIDATION_ENABLED: "false"
  PYTHONPATH: "."

jobs:
  durable-economic-authority:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.13"
      - name: Install focused test dependency
        run: python -m pip install pytest==9.0.2
      - name: Compile MPR-19 surface
        run: |
          python -m py_compile \
            src/durability/mpr19_economic_authority.py \
            tests/test_mpr19_economic_authority.py
      - name: Run authority happy path
        run: python -m pytest -q tests/test_mpr19_economic_authority.py::test_attempt_terminal_outbox_and_replay_are_one_durable_authority
      - name: Run statement crash matrix
        run: python -m pytest -q tests/test_mpr19_economic_authority.py::test_statement_level_crash_probe_rolls_back_every_partial_write
      - name: Run identity probes
        run: python -m pytest -q tests/test_mpr19_economic_authority.py::test_canonical_identity_rejects_bool_float_and_delimiter_collisions
      - name: Run CAS preservation
        run: python -m pytest -q tests/test_mpr19_economic_authority.py::test_revision_cas_failure_preserves_active_reservation
      - name: Run stale owner probe
        run: python -m pytest -q tests/test_mpr19_economic_authority.py::test_outbox_stale_owner_cannot_complete_after_reclaim
      - name: Run replay tamper probe
        run: python -m pytest -q tests/test_mpr19_economic_authority.py::test_replay_detects_materialized_state_tampering
      - name: Run backup restore probe
        run: python -m pytest -q tests/test_mpr19_economic_authority.py::test_backup_restore_is_verified_before_activation
      - name: Run complete focused suite
        run: python -m pytest -q tests/test_mpr19_economic_authority.py
