name: PR-190 focused diagnostic

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - run: python -m pip install -q --requirement requirements.txt
      - run: python -m pip install -q --requirement requirements-dev.txt
      - run: python -m pip install -q --no-deps .
      - name: Capture mypy
        run: python -m mypy --config-file mypy.ini > pr190-mypy.txt 2>&1 || true
      - uses: actions/upload-artifact@v4
        with:
          name: pr190-mypy
          path: pr190-mypy.txt
          if-no-files-found: error
