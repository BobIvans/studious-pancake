name: Materialize roadmap PR-03 on pull request

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  materialize:
    if: github.head_ref == 'roadmap-pr-03-rooted-provider-admission'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: roadmap-pr-03-rooted-provider-admission
          fetch-depth: 0
      - name: Materialize reviewed PR-03 files
        shell: bash
        run: |
          set -o pipefail
          exec > >(tee /tmp/pr03-materialize.log) 2>&1
          set -eux
          cat .pr03_payload.part00 .pr03_payload.part01 .pr03_payload.part02 .pr03_payload.part03 .pr03_payload.part04 > /tmp/pr03_payload.b64
          test "$(wc -c < /tmp/pr03_payload.b64)" -eq 13360
          test "$(sha256sum /tmp/pr03_payload.b64 | cut -d' ' -f1)" = 02e9a478700049c69cb97f3d1fc17ce4910775907daf4c31358b985455dee692
          base64 -d /tmp/pr03_payload.b64 > /tmp/pr03.tgz
          test "$(sha256sum /tmp/pr03.tgz | cut -d' ' -f1)" = b9e292c56ed134438e41cd8e195ac058cbd3f3f7b36d42a2f83e66682be8ed8e
          tar -tzf /tmp/pr03.tgz
          tar -xzf /tmp/pr03.tgz -C .
          grep -qxF 'src/providers/rooted_ingestion_pr03.py' config/format_targets.txt || echo 'src/providers/rooted_ingestion_pr03.py' >> config/format_targets.txt
          grep -qxF 'tests/test_rooted_ingestion_pr03.py' config/format_targets.txt || echo 'tests/test_rooted_ingestion_pr03.py' >> config/format_targets.txt
          git rm .github/workflows/pr03-bootstrap.yml .github/workflows/pr03-pr-bootstrap.yml .pr03-bootstrap-trigger .pr03_payload.b64 .pr03_payload.part00 .pr03_payload.part01 .pr03_payload.part02 .pr03_payload.part03 .pr03_payload.part04
          git rm -f docs/pr03_bootstrap_notice*.md
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add src/providers/rooted_ingestion_pr03.py tests/test_rooted_ingestion_pr03.py docs/roadmap_pr03_rooted_provider_admission.md .github/workflows/roadmap-pr03-rooted-provider-admission.yml config/format_targets.txt
          git status --short
          git commit -m 'Roadmap PR-03: rooted provider admission vertical'
          git push origin HEAD:roadmap-pr-03-rooted-provider-admission
      - name: Upload materialization diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pr03-materialization-diagnostics
          path: |
            /tmp/pr03-materialize.log
            /tmp/pr03_payload.b64
            /tmp/pr03.tgz
          if-no-files-found: warn
