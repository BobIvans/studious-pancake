name: PR-139 scheduled drift operations

on:
  schedule:
    - cron: "17 3 * * *"
    - cron: "43 4 * * 0"
  workflow_dispatch:
    inputs:
      profile:
        description: "PR-139 drift profile"
        required: true
        default: "manual"
        type: choice
        options:
          - daily-lightweight
          - weekly-full
          - manual
  pull_request:
    paths:
      - "src/scheduled_drift_pr139.py"
      - "tests/test_pr139_scheduled_drift.py"
      - ".github/workflows/pr139-scheduled-drift.yml"
  push:
    branches:
      - "pr-139-scheduled-external-onchain-drift"

permissions:
  contents: read

env:
  PAPER_TRADING_ONLY: "true"
  LIVE_TRADING: "false"

jobs:
  focused:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13.13"
      - run: python -m pip install --upgrade pip
      - run: python -m pip install --requirement requirements.txt
      - run: python -m pip install --requirement requirements-dev.txt
      - run: python -m pip install --no-deps .
      - name: Black
        run: >-
          python -m black --check
          src/scheduled_drift_pr139.py
          tests/test_pr139_scheduled_drift.py
      - name: Focused PR-139 tests
        run: >-
          python -m pytest
          tests/test_pr139_scheduled_drift.py
          -q --disable-socket --allow-unix-socket
      - name: Compile
        run: >-
          python -m compileall -q
          src/scheduled_drift_pr139.py
          tests/test_pr139_scheduled_drift.py
      - name: PR-139 self-check
        run: python -m src.scheduled_drift_pr139 --json
