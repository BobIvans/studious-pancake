name: PR-036 exact simulation

on:
  pull_request:
    paths:
      - "src/execution/exact_simulation.py"
      - "src/execution/__init__.py"
      - "tests/execution/test_exact_simulation_pr036.py"
      - ".github/workflows/pr036-exact-simulation.yml"

permissions:
  contents: write

jobs:
  focused:
    name: PR-036 focused verification
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    env:
      PAPER_TRADING_ONLY: "true"
      LIVE_TRADING_ENABLED: "false"
      JITO_ENABLED: "false"
      KAMINO_LIQUIDATION_ENABLED: "false"
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13.13"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt
      - run: python -m pip install --requirement requirements.txt
      - run: python -m pip install --requirement requirements-dev.txt
      - run: python -m pip install --no-deps .
      - name: Apply typed RPC narrowing
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path("src/execution/exact_simulation.py")
          text = path.read_text(encoding="utf-8")
          changed = False

          def replace_once(old: str, new: str) -> None:
              global text, changed
              if old in text:
                  text = text.replace(old, new, 1)
                  changed = True
              elif new not in text:
                  raise SystemExit(f"anchor not found: {old!r}")

          replace_once(
              '        slot = context.get("slot")\n',
              '        slot_value = context.get("slot")\n',
          )
          replace_once(
              '        if not _is_int(slot) or slot < compiled.min_context_slot:\n',
              '        if (\n'
              '            not isinstance(slot_value, int)\n'
              '            or isinstance(slot_value, bool)\n'
              '            or slot_value < compiled.min_context_slot\n'
              '        ):\n',
          )
          replace_once(
              '                    "slot": slot if _is_int(slot) else None,\n',
              '                    "slot": slot_value if _is_int(slot_value) else None,\n',
          )
          replace_once(
              '        if value.get("replacementBlockhash") is not None:\n',
              '        slot = slot_value\n'
              '        if value.get("replacementBlockhash") is not None:\n',
          )
          replace_once(
              '        units = value.get("unitsConsumed")\n',
              '        units_value = value.get("unitsConsumed")\n',
          )
          replace_once(
              '        if not _is_int(units) or units <= 0:\n',
              '        if (\n'
              '            not isinstance(units_value, int)\n'
              '            or isinstance(units_value, bool)\n'
              '            or units_value <= 0\n'
              '        ):\n',
          )
          replace_once(
              '        if units > compute_limit:\n',
              '        units = units_value\n'
              '        if units > compute_limit:\n',
          )
          replace_once(
              '        loaded_size = value.get("loadedAccountsDataSize")\n'
              '        if loaded_size is not None and (not _is_int(loaded_size) or loaded_size < 0):\n',
              '        loaded_value = value.get("loadedAccountsDataSize")\n'
              '        if loaded_value is None:\n'
              '            loaded_size: int | None = None\n'
              '        elif (\n'
              '            isinstance(loaded_value, int)\n'
              '            and not isinstance(loaded_value, bool)\n'
              '            and loaded_value >= 0\n'
              '        ):\n'
              '            loaded_size = loaded_value\n'
              '        else:\n',
          )
          replace_once(
              '            _is_int(loaded_size)\n'
              '            and loaded_size > self.policy.max_loaded_accounts_data_size\n',
              '            loaded_size is not None\n'
              '            and loaded_size > self.policy.max_loaded_accounts_data_size\n',
          )
          replace_once(
              '            loaded_accounts_data_size=(loaded_size if _is_int(loaded_size) else None),\n',
              '            loaded_accounts_data_size=loaded_size,\n',
          )
          replace_once(
              '        slot = context.get("slot")\n',
              '        slot_value = context.get("slot")\n',
          )
          replace_once(
              '        if not _is_int(slot) or slot < compiled.min_context_slot:\n',
              '        if (\n'
              '            not isinstance(slot_value, int)\n'
              '            or isinstance(slot_value, bool)\n'
              '            or slot_value < compiled.min_context_slot\n'
              '        ):\n',
          )
          replace_once(
              '        value = result_dict.get("value")\n',
              '        fee_slot = slot_value\n'
              '        value = result_dict.get("value")\n',
          )
          replace_once(
              '        if not _is_int(value) or value < 0:\n',
              '        if (\n'
              '            not isinstance(value, int)\n'
              '            or isinstance(value, bool)\n'
              '            or value < 0\n'
              '        ):\n',
          )
          replace_once(
              '        return value, slot\n',
              '        fee_lamports = value\n'
              '        return fee_lamports, fee_slot\n',
          )
          if changed:
              path.write_text(text, encoding="utf-8")
          PY
      - run: python -m black src/execution/exact_simulation.py tests/execution/test_exact_simulation_pr036.py
      - name: Commit typed fix
        run: |
          if git diff --quiet; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/execution/exact_simulation.py tests/execution/test_exact_simulation_pr036.py
          git commit -m "PR-036: narrow validated RPC values to integers"
          git push origin "HEAD:${{ github.head_ref }}"
      - run: python -m mypy --config-file mypy.ini src/execution/exact_simulation.py
      - run: python -m pytest tests/execution/test_exact_simulation_pr036.py -q --disable-socket --allow-unix-socket
      - run: python -m compileall -q src/execution tests/execution
