name: PR-222 atomic sender-free execution

on:
  pull_request:
    paths:
      - "src/atomic_sender_free_execution.py"
      - "tests/test_atomic_sender_free_execution.py"
      - "docs/pr222_atomic_sender_free_execution.md"
      - ".github/workflows/pr222-atomic-sender-free.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  pr222-atomic-sender-free:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install focused test dependency
        run: |
          python -m pip install --upgrade pip
          python -m pip install pytest==9.0.2
      - name: Compile PR-222 slice
        run: |
          python -m py_compile \
            src/atomic_sender_free_execution.py \
            tests/test_atomic_sender_free_execution.py
      - name: Run focused PR-222 tests
        env:
          PYTHONPATH: .
        run: python -m pytest -q tests/test_atomic_sender_free_execution.py
