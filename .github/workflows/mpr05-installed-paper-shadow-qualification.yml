name: MPR-05 installed paper shadow qualification

on:
  pull_request:
    paths:
      - 'src/mpr05_installed_paper_shadow_qualification.py'
      - 'tests/test_mpr05_installed_paper_shadow_qualification.py'
      - 'docs/mpr05_installed_paper_shadow_qualification.md'
      - '.github/workflows/mpr05-installed-paper-shadow-qualification.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  mpr05-installed-paper-shadow-qualification:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install pytest
      - name: Compile MPR-05 qualification gate
        run: |
          python -m py_compile \
            src/mpr05_installed_paper_shadow_qualification.py \
            tests/test_mpr05_installed_paper_shadow_qualification.py
      - name: Run MPR-05 focused tests
        run: python -m pytest -q tests/test_mpr05_installed_paper_shadow_qualification.py
