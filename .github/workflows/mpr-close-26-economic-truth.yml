name: MPR Close 26 Economic Truth Gate

on:
  pull_request:
    branches:
      - main
    paths:
      - "src/economic_truth_pr26.py"
      - "tests/test_mpr_close_26_economic_truth.py"
      - "docs/roadmap/mpr_close_26_economic_truth.md"
      - ".github/workflows/mpr-close-26-economic-truth.yml"
  push:
    branches:
      - mpr-close-26-economic-truth-lineage
  workflow_dispatch:

permissions:
  contents: read

jobs:
  focused-economic-truth-gate:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install dependencies
        run: |
          python -m pip install --requirement requirements.txt
          python -m pip install --requirement requirements-dev.txt
          python -m pip install --no-deps .
      - name: Black
        run: |
          python -m black --check \
            src/economic_truth_pr26.py \
            tests/test_mpr_close_26_economic_truth.py
      - name: Focused MPR-CLOSE-26 regression suite
        run: |
          python -m pytest \
            tests/test_mpr_close_26_economic_truth.py \
            -q --disable-socket --allow-unix-socket \
            --junitxml=mpr-close-26-economic-truth-junit.xml
      - name: Compile MPR-CLOSE-26 gate
        run: |
          python -m compileall -q \
            src/economic_truth_pr26.py \
            tests/test_mpr_close_26_economic_truth.py
      - name: Record focused evidence identities
        shell: bash
        run: |
          sha256sum \
            src/economic_truth_pr26.py \
            tests/test_mpr_close_26_economic_truth.py \
            mpr-close-26-economic-truth-junit.xml \
            > mpr-close-26-economic-truth.sha256
      - name: Upload focused evidence
        uses: actions/upload-artifact@v4
        with:
          name: mpr-close-26-economic-truth
          path: |
            mpr-close-26-economic-truth-junit.xml
            mpr-close-26-economic-truth.sha256
          if-no-files-found: error
          retention-days: 14
