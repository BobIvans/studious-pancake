name: PR-223 cryptographic trust gate

on:
  pull_request:
    paths:
      - "src/pr223_cryptographic_trust_settlement_gate.py"
      - "tests/test_pr223_cryptographic_trust_settlement_gate.py"
      - "docs/pr223_cryptographic_trust_signer_settlement.md"
      - ".github/workflows/pr223-cryptographic-trust.yml"
  push:
    branches:
      - "pr-223-*"
    paths:
      - "src/pr223_cryptographic_trust_settlement_gate.py"
      - "tests/test_pr223_cryptographic_trust_settlement_gate.py"
      - "docs/pr223_cryptographic_trust_signer_settlement.md"
      - ".github/workflows/pr223-cryptographic-trust.yml"

permissions:
  contents: read

concurrency:
  group: pr223-cryptographic-trust-${{ github.ref }}
  cancel-in-progress: true

jobs:
  cryptographic-trust-gate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
      - name: Install targeted test dependencies
        run: python -m pip install --disable-pip-version-check pytest==9.0.2
      - name: Compile PR-223 gate
        run: >-
          python -m py_compile
          src/pr223_cryptographic_trust_settlement_gate.py
          tests/test_pr223_cryptographic_trust_settlement_gate.py
      - name: Run PR-223 adversarial tests
        env:
          PYTHONPATH: .
        run: python -m pytest -q tests/test_pr223_cryptographic_trust_settlement_gate.py
