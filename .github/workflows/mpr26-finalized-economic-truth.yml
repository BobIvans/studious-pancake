name: MPR-26 finalized economic truth

on:
  pull_request:
    paths:
      - src/mpr26_finalized_economic_truth.py
      - scripts/verify_mpr26_finalized_economic_truth.py
      - tests/test_mpr26_finalized_economic_truth.py
      - docs/mpr26_finalized_economic_truth_lineage_quarantine.md
      - .github/workflows/mpr26-finalized-economic-truth.yml

permissions:
  contents: read

jobs:
  mpr26-finalized-economic-truth:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8
      - name: Setup Python
        uses: actions/setup-python@e797f83bcb11b83ae66e0230d6156d7c80228e7c
        with:
          python-version: '3.13'
      - name: Install pytest
        run: python -m pip install pytest==9.0.2
      - name: Compile MPR-26 boundary
        run: |
          python -m py_compile \
            src/mpr26_finalized_economic_truth.py \
            scripts/verify_mpr26_finalized_economic_truth.py \
            tests/test_mpr26_finalized_economic_truth.py
      - name: Run MPR-26 verifier
        run: python scripts/verify_mpr26_finalized_economic_truth.py --strict --json
      - name: Run focused tests
        env:
          PYTHONPATH: .
        run: python -m pytest -q tests/test_mpr26_finalized_economic_truth.py
