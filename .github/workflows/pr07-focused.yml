name: PR-07 release-bound soak verifier

on:
  pull_request:
    branches:
      - main
    paths:
      - "src/release_soak_pr07.py"
      - "scripts/pr07_soak_verify.py"
      - "tests/test_pr07_release_bound_soak.py"
      - "docs/pr07_release_bound_soak.md"
      - ".github/workflows/pr07-focused.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  focused-verification:
    runs-on: ubuntu-24.04
    env:
      PAPER_TRADING_ONLY: "true"
      LIVE_TRADING_ENABLED: "false"
      JITO_ENABLED: "false"
      KAMINO_LIQUIDATION_ENABLED: "false"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
      - run: python -m pip install --quiet --requirement requirements.txt
      - run: python -m pip install --quiet --requirement requirements-dev.txt
      - run: python -m pip install --quiet --no-deps .
      - name: Black format gate
        run: |
          python -m black --check \
            src/release_soak_pr07.py \
            scripts/pr07_soak_verify.py \
            tests/test_pr07_release_bound_soak.py
      - name: Static type gate
        run: python -m mypy --config-file mypy.ini src/release_soak_pr07.py
      - name: Focused PR-07 regressions
        run: |
          python -m pytest -q tests/test_pr07_release_bound_soak.py \
            --disable-socket --allow-unix-socket
