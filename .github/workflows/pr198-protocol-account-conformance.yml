name: PR-198 protocol account conformance

on:
  pull_request:
    branches:
      - main
    paths:
      - "src/protocol_account_conformance_pr198.py"
      - "tests/test_pr198_protocol_account_conformance.py"
      - "docs/pr198_protocol_account_conformance.md"
      - "config/format_targets.txt"
      - ".github/workflows/pr198-protocol-account-conformance.yml"
  push:
    branches:
      - roadmap-pr-198-protocol-account-conformance

permissions:
  contents: read

jobs:
  protocol-account-conformance:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install dependencies
        run: |
          python -m pip install --requirement requirements.txt
          python -m pip install --requirement requirements-dev.txt
          python -m pip install --no-deps .
      - name: Black
        run: |
          python -m black --check \
            src/protocol_account_conformance_pr198.py \
            tests/test_pr198_protocol_account_conformance.py
      - name: Mypy
        run: |
          python -m mypy --config-file mypy.ini \
            src/protocol_account_conformance_pr198.py
      - name: Focused regression suite
        run: |
          python -m pytest \
            tests/test_pr198_protocol_account_conformance.py \
            -q --disable-socket --allow-unix-socket \
            --junitxml=pr198-junit.xml
      - name: Compile authority
        run: |
          python -m compileall -q \
            src/protocol_account_conformance_pr198.py \
            tests/test_pr198_protocol_account_conformance.py
      - name: Record focused evidence identities
        shell: bash
        run: |
          sha256sum \
            src/protocol_account_conformance_pr198.py \
            tests/test_pr198_protocol_account_conformance.py \
            pr198-junit.xml > pr198-focused-evidence.sha256
      - name: Upload focused evidence
        uses: actions/upload-artifact@v4
        with:
          name: pr198-protocol-account-conformance
          path: |
            pr198-junit.xml
            pr198-focused-evidence.sha256
          if-no-files-found: error
          retention-days: 14
