name: PR-04 one-time Black formatter

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  format:
    if: ${{ !contains(github.event.pull_request.head.sha, 'pr04-black') }}
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: pr-04-repeated-installed-paper-service
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - run: python -m pip install black==26.3.1
      - run: >-
          python -m black
          src/cli.py
          src/paper_shadow/repeated_service_pr04.py
          tests/test_pr04_repeated_installed_paper_service.py
      - name: Commit formatting
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            src/cli.py \
            src/paper_shadow/repeated_service_pr04.py \
            tests/test_pr04_repeated_installed_paper_service.py
          if ! git diff --cached --quiet; then
            git commit -m "PR-04: apply Black formatting [pr04-black]"
            git push origin HEAD:pr-04-repeated-installed-paper-service
          fi
