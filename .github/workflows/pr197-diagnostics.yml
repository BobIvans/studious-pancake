name: PR-197 diagnostics

on:
  pull_request:
    paths:
      - "src/security/secret_scan.py"
      - "tests/test_pr146_secret_scanner_followup.py"
      - ".github/workflows/pr197-diagnostics.yml"

permissions:
  contents: read

jobs:
  diagnostics:
    runs-on: ubuntu-24.04
    env:
      PAPER_TRADING_ONLY: "true"
      LIVE_TRADING_ENABLED: "false"
      JITO_ENABLED: "false"
      KAMINO_LIQUIDATION_ENABLED: "false"
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          python -m pip install --requirement requirements.txt
          python -m pip install --requirement requirements-dev.txt
          python -m pip install --no-deps .

      - name: Flake8 syntax gate
        id: flake8
        continue-on-error: true
        run: >-
          python -m flake8 src/security/secret_scan.py
          tests/test_pr146_secret_scanner_followup.py
          --count --select=E9,F63,F7,F82 --show-source --statistics

      - name: Black changed files
        id: black
        continue-on-error: true
        run: >-
          python -m black --check src/security/secret_scan.py
          tests/test_pr146_secret_scanner_followup.py

      - name: Mypy repository gate
        id: mypy
        continue-on-error: true
        run: python -m mypy --config-file mypy.ini

      - name: Bandit changed source
        id: bandit
        continue-on-error: true
        run: python -m bandit src/security/secret_scan.py -lll -iii -q

      - name: PR-197 targeted tests
        id: targeted
        continue-on-error: true
        run: >-
          python -m pytest tests/test_pr146_secret_scanner_followup.py
          -q --disable-socket --allow-unix-socket

      - name: Full quality gate without audit
        id: quality
        continue-on-error: true
        run: python scripts/quality_gate.py

      - name: Report diagnostic failures
        if: always()
        env:
          FLAKE8: ${{ steps.flake8.outcome }}
          BLACK: ${{ steps.black.outcome }}
          MYPY: ${{ steps.mypy.outcome }}
          BANDIT: ${{ steps.bandit.outcome }}
          TARGETED: ${{ steps.targeted.outcome }}
          QUALITY: ${{ steps.quality.outcome }}
        run: |
          printf 'flake8=%s\nblack=%s\nmypy=%s\nbandit=%s\ntargeted=%s\nquality=%s\n' \
            "$FLAKE8" "$BLACK" "$MYPY" "$BANDIT" "$TARGETED" "$QUALITY"
          test "$FLAKE8" = success
          test "$BLACK" = success
          test "$MYPY" = success
          test "$BANDIT" = success
          test "$TARGETED" = success
          test "$QUALITY" = success
