name: PR201 diagnostics

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  capture-black-diff:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
      - name: Install formatter
        run: python -m pip install --requirement requirements-dev.txt
      - name: Capture exact Black patch
        shell: bash
        run: |
          python -m black --diff src/authorization_replay_pr201.py > pr201-black.diff
          cat pr201-black.diff
      - name: Upload Black patch
        uses: actions/upload-artifact@v4
        with:
          name: pr201-black-diff
          path: pr201-black.diff
          if-no-files-found: error
          retention-days: 1
