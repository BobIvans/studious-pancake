name: PR-190 bootstrap

on:
  push:
    branches: [pr-190-canonical-config-identity]
    paths:
      - scripts/apply_pr190_patch.py
      - .github/workflows/pr190-bootstrap.yml

permissions:
  contents: write

jobs:
  apply-and-verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: pr-190-canonical-config-identity
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - run: python scripts/apply_pr190_patch.py
      - run: >-
          python -m pip install --disable-pip-version-check
          pydantic==2.13.4 PyYAML==6.0.3 pytest==9.0.2
      - run: >-
          python -m pytest -q
          tests/test_pr026_typed_config.py
          tests/test_live_readiness.py
          tests/test_pr190_canonical_config.py
      - run: python -m compileall -q src
      - name: Commit integrated patch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "PR-190: wire strict canonical configuration paths"
          git push origin HEAD:pr-190-canonical-config-identity

# Retriggered after parallel branch preparation; this workflow deletes itself.
