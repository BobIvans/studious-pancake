name: PR-197 Black formatter

on:
  pull_request:
    paths:
      - ".github/workflows/pr197-workflow-metadata.yml"
      - "src/security/secret_scan.py"

permissions:
  contents: read

jobs:
  format:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13.13"
          cache: pip
          cache-dependency-path: requirements-dev.txt

      - name: Install Black
        run: python -m pip install --quiet --requirement requirements-dev.txt

      - name: Format scanner
        run: python -m black src/security/secret_scan.py

      - name: Upload formatted scanner
        uses: actions/upload-artifact@v4
        with:
          name: pr197-black-formatted-scanner
          path: src/security/secret_scan.py
          if-no-files-found: error
          retention-days: 1
