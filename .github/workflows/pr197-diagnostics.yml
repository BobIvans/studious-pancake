name: PR-197 diagnostics

on:
  pull_request:
    paths:
      - "src/security/secret_scan.py"
      - "tests/test_pr146_secret_scanner_followup.py"
      - ".github/workflows/pr197-diagnostics.yml"

permissions:
  contents: read

jobs:
  diagnostics:
    runs-on: ubuntu-latest
    env:
      PAPER_TRADING_ONLY: "true"
      LIVE_TRADING_ENABLED: "false"
      JITO_ENABLED: "false"
      KAMINO_LIQUIDATION_ENABLED: "false"
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          python -m pip install --requirement requirements.txt
          python -m pip install --requirement requirements-dev.txt
          python -m pip install --no-deps .

      - name: Exact monolithic repository verification
        continue-on-error: true
        run: python scripts/verify_repo.py

      - name: Pip check
        continue-on-error: true
        run: python -m pip check

      - name: Flake8 syntax gate
        continue-on-error: true
        run: >-
          python -m flake8 src/security/secret_scan.py
          tests/test_pr146_secret_scanner_followup.py
          --count --select=E9,F63,F7,F82 --show-source --statistics

      - name: Black changed files
        continue-on-error: true
        run: >-
          python -m black --check src/security/secret_scan.py
          tests/test_pr146_secret_scanner_followup.py

      - name: Mypy repository gate
        continue-on-error: true
        run: python -m mypy --config-file mypy.ini

      - name: Bandit changed source
        continue-on-error: true
        run: python -m bandit src/security/secret_scan.py -lll -iii -q

      - name: PR-197 targeted tests
        continue-on-error: true
        run: >-
          python -m pytest tests/test_pr146_secret_scanner_followup.py
          -q --disable-socket --allow-unix-socket

      - name: Quality gate without dependency audit
        continue-on-error: true
        run: python scripts/quality_gate.py

      - name: Dependency audit only
        continue-on-error: true
        run: >-
          python -m pip_audit -r requirements.txt --strict
          --progress-spinner off

      - name: Package smoke
        continue-on-error: true
        run: python scripts/package_smoke.py

      - name: Compile all
        continue-on-error: true
        run: python -m compileall -q arb_bot.py src scripts tests

      - name: CLI status
        continue-on-error: true
        run: python arb_bot.py status --json

      - name: CLI capabilities
        continue-on-error: true
        run: python arb_bot.py capabilities --json

      - name: Selected baseline tests
        continue-on-error: true
        run: >-
          python -m pytest
          tests/test_pr023_runtime_truth.py
          tests/test_launcher_startup_smoke.py
          tests/test_import_smoke.py
          tests/test_quality_quarantine.py
          tests/test_pr087_package_boundary.py
          tests/test_pr101_marginfi_complete_protocol_evidence.py
          tests/test_pr106_canonical_sender_lifecycle_disabled.py
          tests/test_pr115_simulation_owned_economic_proof.py
          tests/test_pr116_coherent_marginfi_snapshot_oracle.py
          tests/test_pr121_single_durable_lifecycle_truth.py
          tests/test_pr120_secret_resolver_config_jito.py
          tests/test_pr125_lst_governance_policy.py
          tests/test_pr136_rooted_rpc_quorum.py
          tests/test_pr140_data_lineage_quarantine.py
          -q --disable-socket --allow-unix-socket

      - name: Full offline pytest
        continue-on-error: true
        run: >-
          python -m pytest -m "not live and not manual"
          --disable-socket --allow-unix-socket -q

      - name: Clean tree
        if: always()
        continue-on-error: true
        run: |
          git status --porcelain
          test -z "$(git status --porcelain)"
