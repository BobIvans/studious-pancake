name: PR-206 exact checkout materialization

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  upload-checkouts:
    if: github.head_ref == 'pr-206-durable-time-semantic-replay'
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
      - name: Archive exact latest main
        shell: bash
        run: |
          git rev-parse HEAD > /tmp/pr206-main-sha.txt
          tar --exclude=.git -czf /tmp/pr206-latest-main.tar.gz .
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
          clean: true
      - name: Archive exact PR head
        shell: bash
        run: |
          git rev-parse HEAD > /tmp/pr206-head-sha.txt
          tar --exclude=.git -czf /tmp/pr206-current-head.tar.gz .
      - uses: actions/upload-artifact@v4
        with:
          name: pr206-exact-checkouts
          path: |
            /tmp/pr206-latest-main.tar.gz
            /tmp/pr206-main-sha.txt
            /tmp/pr206-current-head.tar.gz
            /tmp/pr206-head-sha.txt
          if-no-files-found: error
          retention-days: 1
