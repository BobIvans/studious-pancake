name: MPR-02 unified durable authority gate

on:
  pull_request:
    paths:
      - "src/durability/mpr02_unified_authority_gate.py"
      - "tests/test_mpr02_unified_authority_gate.py"
      - "docs/mpr02_unified_durable_authority_gate.md"
      - ".github/workflows/mpr02-unified-durable-authority-gate.yml"
  push:
    branches:
      - roadmap/mpr-02-unified-durable-authority-gate

permissions:
  contents: read

jobs:
  focused-verification:
    runs-on: ubuntu-24.04
    env:
      PAPER_TRADING_ONLY: "true"
      LIVE_TRADING_ENABLED: "false"
      JITO_ENABLED: "false"
      KAMINO_LIQUIDATION_ENABLED: "false"
      PYTHONPATH: "."
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - run: python -m pip install --requirement requirements.txt
      - run: python -m pip install --requirement requirements-dev.txt
      - run: >-
          python -m py_compile
          src/durability/mpr02_unified_authority_gate.py
          tests/test_mpr02_unified_authority_gate.py
      - run: >-
          python -m pytest -q
          tests/test_mpr02_unified_authority_gate.py
      - run: >-
          python -m compileall -q
          src/durability/mpr02_unified_authority_gate.py
          tests/test_mpr02_unified_authority_gate.py
