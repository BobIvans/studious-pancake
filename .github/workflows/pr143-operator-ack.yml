name: PR-143 operator acknowledgement gate

on:
  pull_request:
    paths:
      - "src/operator_ack_pr143.py"
      - "tests/test_pr143_operator_ack.py"
      - ".github/workflows/pr143-operator-ack.yml"
  push:
    paths:
      - "src/operator_ack_pr143.py"
      - "tests/test_pr143_operator_ack.py"
      - ".github/workflows/pr143-operator-ack.yml"
  workflow_dispatch:

permissions:
  contents: read

env:
  PAPER_TRADING_ONLY: "true"
  LIVE_TRADING: "false"

jobs:
  focused:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - run: python -m pip install --upgrade pip
      - run: python -m pip install --requirement requirements.txt
      - run: python -m pip install --requirement requirements-dev.txt
      - run: python -m pip install --no-deps .
      - name: Black
        run: |
          python -m black --check \
            src/operator_ack_pr143.py \
            tests/test_pr143_operator_ack.py
      - name: Focused PR-143 tests
        run: python -m pytest tests/test_pr143_operator_ack.py -q
      - name: Compile
        run: |
          python -m compileall -q \
            src/operator_ack_pr143.py \
            tests/test_pr143_operator_ack.py
      - name: PR-143 self-check
        run: python -m src.operator_ack_pr143 --json
