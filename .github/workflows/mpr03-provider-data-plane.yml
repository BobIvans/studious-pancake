name: MPR-03 provider data plane gate

on:
  pull_request:
    branches:
      - main
    paths:
      - "src/mpr03_provider_data_plane.py"
      - "tests/test_mpr03_provider_data_plane.py"
      - "docs/mpr03_provider_data_plane_gate.md"
      - ".github/workflows/mpr03-provider-data-plane.yml"
  push:
    branches:
      - mpr-03-rooted-provider-data-plane-gate
  workflow_dispatch:

permissions:
  contents: read

jobs:
  provider-data-plane-gate:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    env:
      PAPER_TRADING_ONLY: "true"
      LIVE_TRADING_ENABLED: "false"
      JITO_ENABLED: "false"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
      - name: Install dependencies
        run: |
          python -m pip install --requirement requirements.txt
          python -m pip install --requirement requirements-dev.txt
          python -m pip install --no-deps .
      - name: Compile MPR-03 boundary
        run: |
          python -m compileall -q \
            src/mpr03_provider_data_plane.py \
            tests/test_mpr03_provider_data_plane.py
      - name: Critical static errors
        run: |
          python -m flake8 \
            src/mpr03_provider_data_plane.py \
            tests/test_mpr03_provider_data_plane.py \
            --count --select=E9,F63,F7,F82 --show-source --statistics
      - name: Focused regression suite
        run: |
          python -m pytest \
            tests/test_mpr03_provider_data_plane.py \
            -q --disable-socket --allow-unix-socket
