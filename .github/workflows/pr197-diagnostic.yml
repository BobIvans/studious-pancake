name: PR-197 diagnostic artifact

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  diagnostic:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - run: python -m pip install --requirement requirements.txt
      - run: python -m pip install --requirement requirements-dev.txt
      - run: python -m pip install --no-deps .
      - name: Capture verification output
        shell: bash
        run: |
          set +e
          python scripts/verify_repo.py > pr197-verify.log 2>&1
          status=$?
          echo "$status" > pr197-verify.exit
          exit 0
      - uses: actions/upload-artifact@v4
        with:
          name: pr197-verify-diagnostic
          path: |
            pr197-verify.log
            pr197-verify.exit
          if-no-files-found: error
