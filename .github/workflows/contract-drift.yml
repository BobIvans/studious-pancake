name: External contract drift

on:
  pull_request:
    paths:
      - "src/external_contracts/**"
      - "src/resources/external_contracts.json"
      - "src/resources/contracts/**"
      - "tests/external_contracts/**"
      - ".github/workflows/contract-drift.yml"
  push:
    branches:
      - main
    paths:
      - "src/external_contracts/**"
      - "src/resources/external_contracts.json"
      - "src/resources/contracts/**"

permissions:
  contents: read

jobs:
  verify-contracts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13.13"
          cache: pip
          cache-dependency-path: requirements-dev.txt
      - run: python -m pip install --requirement requirements-dev.txt
      - run: python -m pip install --no-deps .
      - run: flashloan-contracts validate
      - run: flashloan-contracts drift
      - run: python -m pytest tests/external_contracts -q
