[mypy]
python_version = 3.13
files =
    arb_bot.py,
    src/application.py,
    src/capabilities.py,
    src/cli.py,
    src/container_runtime.py,
    src/config/chain_registry.py,
    src/config/doctor.py,
    src/config/runtime.py,
    src/data_plane,
    src/domain,
    src/execution,
    src/providers,
    src/release_gate,
    src/routing,
    src/security,
    src/strategy
ignore_missing_imports = True
check_untyped_defs = True
no_implicit_optional = True
warn_redundant_casts = True
warn_unused_ignores = True
show_error_codes = True
pretty = True
exclude = (?x)(^src/legacy_arb_bot\.py$)

# Temporary, explicit type-debt quarantine. Each entry is mirrored in
# config/typecheck_quarantine.json and owned by a later roadmap PR.
[mypy-src.application]
ignore_errors = True

[mypy-src.execution.transaction_compiler]
ignore_errors = True

[mypy-src.execution.shadow]
ignore_errors = True

[mypy-src.execution.transaction_simulator]
ignore_errors = True

[mypy-src.providers.jupiter.router]
ignore_errors = True

[mypy-src.routing.adapters]
ignore_errors = True

[mypy-src.execution.live_control]
disable_error_code = import-untyped
