          +def _runtime_environment(config: RuntimeConfig) -> str:
          +    runtime = getattr(config, "runtime", None)
          +    mode = getattr(runtime, "mode", "paper")
          +    value = getattr(mode, "value", mode)
          +    return str(value or "paper")
