[mypy]
python_version = 3.13
files =
    arb_bot.py,
    src/application.py,
    src/authority_map.py,
    src/capabilities.py,
    src/cli.py,
    src/container_runtime.py,
    src/config/chain_registry.py,
    src/config/doctor.py,
    src/config/runtime.py,
    src/data_plane,
    src/durability/unified_authority_pr02.py,
    src/durability/runtime_kernel_pr196.py,
    src/domain,
    src/execution,
    src/providers,
    src/release_gate,
    src/routing,
    src/security,
    src/strategy
ignore_missing_imports = True
check_untyped_defs = True
no_implicit_optional = True
warn_redundant_casts = True
warn_unused_ignores = True
show_error_codes = True
pretty = True
exclude = (?x)(^src/legacy_arb_bot\.py$)

# Temporary, explicit type-debt quarantine. Each entry is mirrored in
# config/typecheck_quarantine.json and owned by a later roadmap PR.
[mypy-src.application]
ignore_errors = True

[mypy-src.execution.transaction_compiler]
ignore_errors = True

[mypy-src.execution.shadow]
ignore_errors = True

[mypy-src.execution.transaction_simulator]
ignore_errors = True

[mypy-src.providers.jupiter.router]
ignore_errors = True

[mypy-src.routing.adapters]
ignore_errors = True

[mypy-src.execution.live_control]
disable_error_code = import-untyped

# PR-191 performs deliberate runtime compatibility cutovers against legacy
# modules that are quarantined from the production wheel.  The implementation
# is covered by focused runtime tests; these three codes describe the dynamic
# base/attribute rebinding itself rather than untyped business logic.
[mypy-src.paper_shadow.immutable_lifecycle_pr191]
disable_error_code = valid-type,misc,attr-defined

[mypy-src.execution.immutable_accounting_pr191]
disable_error_code = valid-type,misc,attr-defined

# PR-199 preserves the PR-188 public class through a deliberate runtime subclass
# installation. These codes cover only the dynamic base and ModuleType rebinding;
# the typed credential, proxy, TLS and request-context logic remains checked.
[mypy-src.providers.helius.authenticated_ingress]
disable_error_code = valid-type,misc,attr-defined

# MEGA-PR B2 introduces active provider-conformance ports while the source/wheel
# provider surface is still being consolidated. Runtime behavior is covered by
# focused tests; strict typing is intentionally deferred to the provider cutover.
[mypy-src.providers.conformance.mega_b2]
ignore_errors = True

# MEGA-PR A3 installs a durable SQLite paper service while B3 evidence and the
# exact-attempt source are still being actively cut over. Runtime behavior is
# covered by A3 focused tests; strict typing should be restored in the full A3
# completion slice once the batch source and lifecycle DB authority are final.
[mypy-src.paper_shadow.durable_service_a3]
follow_imports = skip
ignore_errors = True

# PR-06 introduces reviewed single-open OS-file handling. Runtime behavior is
# covered by PR-06 tests; strict syscall typing is restored in the hardening
# follow-up once the helper boundary is stabilized across platforms.
[mypy-src.security.secure_files]
ignore_errors = True

# PR-196 installs a sender-free durable runtime kernel while the installed
# paper/shadow composition cutover remains Draft. Runtime behavior is covered by
# focused PR-196 tests; strict typing is restored when this kernel becomes the
# active runtime authority rather than a standalone foundation slice.
[mypy-src.durability.runtime_kernel_pr196]
ignore_errors = True

# PR-209 installs a sender-free exact atomic semantics acceptance gate while
# PR-208/209 materialized protocol evidence and runtime kernel cutover are still
# separate corrective slices. Runtime behavior is covered by focused PR-209 tests;
# strict typing is restored when this gate becomes the active atomic compiler
# authority rather than a standalone foundation slice.
[mypy-src.execution.pr209_exact_atomic_semantics_gate]
ignore_errors = True
