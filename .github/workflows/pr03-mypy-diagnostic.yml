name: Capture PR-03 mypy diagnostics

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  diagnostic:
    if: github.head_ref == 'roadmap-pr-03-fix-runner'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: roadmap-pr-03-rooted-provider-admission
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - run: python -m pip install --requirement requirements.txt
      - run: python -m pip install --requirement requirements-dev.txt
      - name: Apply patch and format
        run: |
          git show origin/roadmap-pr-03-fix-runner:.pr03_hardening.patch | git apply
          python -m black src/providers/rooted_ingestion_pr03.py tests/test_rooted_ingestion_pr03.py
      - name: Capture mypy
        shell: bash
        run: |
          set +e
          python -m mypy --config-file mypy.ini src/providers/rooted_ingestion_pr03.py > /tmp/pr03-mypy.log 2>&1
          echo $? > /tmp/pr03-mypy.rc
          set -e
          cat /tmp/pr03-mypy.log
      - uses: actions/upload-artifact@v4
        with:
          name: pr03-mypy-diagnostic
          path: |
            /tmp/pr03-mypy.log
            /tmp/pr03-mypy.rc
            src/providers/rooted_ingestion_pr03.py
            tests/test_rooted_ingestion_pr03.py
