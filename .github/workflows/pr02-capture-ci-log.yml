name: PR-02 capture repository verification

on:
  push:
    branches: [roadmap/pr-02-unified-lifecycle-authority]
  pull_request:
    branches: [main]

permissions:
  actions: read
  contents: write

jobs:
  capture:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: roadmap/pr-02-unified-lifecycle-authority
      - name: Download exact repository-verification job log
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          curl --fail --location --silent --show-error \
            --header "Authorization: Bearer ${GH_TOKEN}" \
            --header "Accept: application/vnd.github+json" \
            --header "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/actions/jobs/89080394339/logs" \
            --output /tmp/job.log
          python - <<'PY'
          from io import BytesIO
          from pathlib import Path
          import zipfile

          raw = Path('/tmp/job.log').read_bytes()
          if zipfile.is_zipfile(BytesIO(raw)):
              with zipfile.ZipFile(BytesIO(raw)) as bundle:
                  text = '\n'.join(
                      bundle.read(name).decode('utf-8', errors='replace')
                      for name in sorted(bundle.namelist())
                  )
          else:
              text = raw.decode('utf-8', errors='replace')
          Path('pr02-ci-failure.log').write_text(
              '\n'.join(text.splitlines()[-900:]) + '\n', encoding='utf-8'
          )
          PY
      - name: Publish log and remove this workflow
        run: |
          rm .github/workflows/pr02-capture-ci-log.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -f pr02-ci-failure.log
          git add -u .github/workflows/pr02-capture-ci-log.yml
          git commit -m "PR-02: capture repository verification failure"
          git push origin HEAD:roadmap/pr-02-unified-lifecycle-authority
