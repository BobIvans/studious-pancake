name: PR-197 apply root policy

on:
  pull_request:
    paths:
      - ".github/workflows/pr197-apply-root-policy.yml"

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: pr-146-secret-scanner-followup
          fetch-depth: 1

      - name: Patch safe reference roots
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path("src/security/secret_scan.py")
          text = path.read_text(encoding="utf-8")
          if '    "env_values",\n' not in text:
              marker = '    "env_value",\n'
              insertion = (
                  '    "env_value",\n'
                  '    "env_values",\n'
                  '    "key",\n'
                  '    "os",\n'
              )
              if marker not in text:
                  raise SystemExit("safe-reference insertion marker not found")
              text = text.replace(marker + '    "key",\n', insertion, 1)
              text = text.replace(
                  '    "secret",\n    "token",\n',
                  '    "secret",\n    "secrets",\n    "settings",\n    "token",\n',
                  1,
              )
              path.write_text(text, encoding="utf-8")
          PY

      - name: Install formatter and test dependencies
        run: python -m pip install --quiet --requirement requirements-dev.txt

      - name: Format and test
        run: |
          python -m black src/security/secret_scan.py
          python -m pytest tests/test_pr146_secret_scanner_followup.py -q \
            --disable-socket --allow-unix-socket

      - name: Commit patch
        run: |
          git config user.name "chatgpt-codex-connector[bot]"
          git config user.email "198982749+chatgpt-codex-connector[bot]@users.noreply.github.com"
          git add src/security/secret_scan.py
          git diff --cached --quiet && exit 0
          git commit -m "fix: admit explicit secret-reference roots"
          git push origin HEAD:pr-146-secret-scanner-followup
