name: PR-198 sender-free artifact gate

on:
  pull_request:
    paths:
      - "src/pr198_sender_free_artifact_gate.py"
      - "tests/test_pr198_sender_free_artifact_gate.py"
      - "docs/pr198_sender_free_artifact_gate.md"
      - ".github/workflows/pr198-sender-free-artifact-gate.yml"
  push:
    branches:
      - roadmap/pr-198-pass5-sender-free-artifact-gate

permissions:
  contents: read

jobs:
  focused-verification:
    runs-on: ubuntu-24.04
    env:
      PAPER_TRADING_ONLY: "true"
      LIVE_TRADING_ENABLED: "false"
      JITO_ENABLED: "false"
      KAMINO_LIQUIDATION_ENABLED: "false"
      PYTHONPATH: "."
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - run: python -m pip install --requirement requirements.txt
      - run: python -m pip install --requirement requirements-dev.txt
      - run: >-
          python -m py_compile
          src/pr198_sender_free_artifact_gate.py
          tests/test_pr198_sender_free_artifact_gate.py
      - run: >-
          python -m pytest -q
          tests/test_pr198_sender_free_artifact_gate.py
      - run: >-
          python -m compileall -q
          src/pr198_sender_free_artifact_gate.py
          tests/test_pr198_sender_free_artifact_gate.py
