name: MEGA-PR-02 apply typed loop fix

on:
  pull_request:
    paths:
      - '.github/workflows/mega-pr-02-diagnostic.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  apply-fix-and-cleanup:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262
        with:
          ref: ${{ github.event.pull_request.head.ref || github.ref_name }}
          fetch-depth: 0
          show-progress: false
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: '3.13'
      - name: Apply type-safe loop names
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          source = Path('src/release_gate/production_paper_qualification.py')
          text = source.read_text(encoding='utf-8')

          replacements = (
              (
                  '        for value, name in (\n'
                  '            (self.release_wheel_sha256, "release_wheel_sha256"),',
                  '        for digest, digest_name in (\n'
                  '            (self.release_wheel_sha256, "release_wheel_sha256"),',
              ),
              (
                  '            _sha256(value, name)\n'
                  '        for value, name in (\n'
                  '            (self.synthetic_contamination_count, "synthetic_contamination_count"),',
                  '            _sha256(digest, digest_name)\n'
                  '        for count, count_name in (\n'
                  '            (self.synthetic_contamination_count, "synthetic_contamination_count"),',
              ),
              (
                  '            _non_negative_int(value, name)\n'
                  '        if not isinstance(self.required_chaos_scenarios_completed, tuple):',
                  '            _non_negative_int(count, count_name)\n'
                  '        if not isinstance(self.required_chaos_scenarios_completed, tuple):',
              ),
          )

          for old, new in replacements:
              if text.count(old) != 1:
                  raise SystemExit(f'expected exactly one match for: {old!r}')
              text = text.replace(old, new, 1)

          source.write_text(text, encoding='utf-8')
          Path('.github/workflows/mega-pr-02-diagnostic.yml').unlink()
          PY
      - name: Commit fix and remove diagnostic workflow
        shell: bash
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A src/release_gate/production_paper_qualification.py .github/workflows/mega-pr-02-diagnostic.yml
          git commit -m 'fix: use type-specific evidence loop variables'
          git push origin HEAD:${{ github.event.pull_request.head.ref || github.ref_name }}
