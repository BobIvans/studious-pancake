name: PR-190 diagnostics

on:
  push:
    branches: [pr-190-canonical-config-identity-20260723]
    paths:
      - .github/workflows/pr190-diagnostics.yml

permissions:
  contents: write

jobs:
  capture-verification:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: pr-190-canonical-config-identity-20260723
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - run: python -m pip install --requirement requirements.txt
      - run: python -m pip install --requirement requirements-dev.txt
      - run: python -m pip install --no-deps .
      - name: Capture repository verification
        shell: bash
        run: |
          set +e
          python scripts/verify_repo.py > pr190-diagnostics.txt 2>&1
          status=$?
          echo "exit_status=$status" >> pr190-diagnostics.txt
          exit 0
      - name: Commit diagnostics temporarily
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add pr190-diagnostics.txt
          git commit -m "PR-190: capture verification diagnostics"
          git push origin HEAD:pr-190-canonical-config-identity-20260723
