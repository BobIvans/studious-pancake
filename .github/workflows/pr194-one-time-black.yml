name: PR-194 one-time Black formatter

on:
  push:
    branches:
      - pr-194-hermetic-supply-chain-baseline
    paths:
      - ".github/workflows/pr194-one-time-black.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  format:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: pr-194-hermetic-supply-chain-baseline
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - run: python -m pip install --requirement requirements-dev.txt
      - run: >-
          python -m black
          setup.py
          scripts/package_smoke.py
          src/production_surface.py
          tests/test_pr194_production_surface_manifest.py
      - name: Commit formatting
        run: |
          if git diff --quiet; then
            echo "No formatting changes"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add setup.py scripts/package_smoke.py src/production_surface.py tests/test_pr194_production_surface_manifest.py
          git commit -m "PR-194 apply Black formatting"
          git push origin HEAD:pr-194-hermetic-supply-chain-baseline
