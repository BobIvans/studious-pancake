name: PR-194 hermetic package surface

on:
  pull_request:
    paths:
      - "Dockerfile"
      - "setup.py"
      - "scripts/package_smoke.py"
      - "scripts/image_smoke.sh"
      - "src/production_surface.py"
      - "src/resources/production_surface_manifest.json"
      - "tests/test_pr194_production_surface_manifest.py"
      - "docs/pr194_hermetic_package_surface.md"
      - "config/format_targets.txt"
      - ".github/workflows/pr194-hermetic-package-surface.yml"
  push:
    branches:
      - pr-194-hermetic-supply-chain-baseline

permissions:
  contents: read

jobs:
  focused-verification:
    runs-on: ubuntu-24.04
    env:
      PAPER_TRADING_ONLY: "true"
      LIVE_TRADING_ENABLED: "false"
      JITO_ENABLED: "false"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - run: python -m pip install --requirement requirements.txt
      - run: python -m pip install --requirement requirements-dev.txt
      - run: >-
          python -m black --check
          setup.py
          scripts/package_smoke.py
          src/production_surface.py
          tests/test_pr194_production_surface_manifest.py
      - run: python -m mypy src/production_surface.py
      - run: python -m pytest -q tests/test_pr194_production_surface_manifest.py
      - run: python scripts/package_smoke.py
      - run: >-
          python -m compileall -q
          setup.py
          scripts/package_smoke.py
          src/production_surface.py
  repository-verification-diagnostic:
    runs-on: ubuntu-24.04
    env:
      PAPER_TRADING_ONLY: "true"
      LIVE_TRADING_ENABLED: "false"
      JITO_ENABLED: "false"
      KAMINO_LIQUIDATION_ENABLED: "false"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - run: python -m pip install -q --requirement requirements.txt
      - run: python -m pip install -q --requirement requirements-dev.txt
      - run: python -m pip install -q --no-deps .
      - name: Run repository verification with compact failure tail
        run: |
          set +e
          python scripts/verify_repo.py > /tmp/pr194-verify-repo.log 2>&1
          status=$?
          set -e
          if [ "$status" -ne 0 ]; then
            tail -n 160 /tmp/pr194-verify-repo.log
          fi
          exit "$status"
