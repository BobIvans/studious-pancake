name: PR-202 isolated signer settlement

on:
  pull_request:
    branches:
      - main
    paths:
      - "src/live_boundary/pr202_isolated_signer_settlement.py"
      - "src/submission/pr202_isolated_signer_settlement.py"
      - "tests/test_pr202_isolated_signer_settlement.py"
      - "docs/pr202_isolated_signer_settlement.md"
      - ".github/workflows/pr202-isolated-signer-settlement.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  focused-verification:
    runs-on: ubuntu-24.04
    env:
      PAPER_TRADING_ONLY: "true"
      LIVE_TRADING_ENABLED: "false"
      JITO_ENABLED: "false"
      KAMINO_LIQUIDATION_ENABLED: "false"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
      - run: python -m pip install --quiet --requirement requirements.txt
      - run: python -m pip install --quiet --requirement requirements-dev.txt
      - run: python -m pip install --quiet --no-deps .
      - name: Focused PR-202 regressions
        run: |
          python -m pytest -q tests/test_pr202_isolated_signer_settlement.py \
            --disable-socket --allow-unix-socket
      - name: Compile
        run: |
          python -m py_compile \
            src/live_boundary/pr202_isolated_signer_settlement.py \
            src/submission/pr202_isolated_signer_settlement.py \
            tests/test_pr202_isolated_signer_settlement.py
