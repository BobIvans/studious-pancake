name: Roadmap PR-10 limited-live canary foundation

on:
  pull_request:
    paths:
      - "src/live_canary/roadmap_pr10.py"
      - "tests/test_pr10_limited_live_canary.py"
      - "docs/architecture/pr10_limited_live_canary_foundation.md"
      - ".github/workflows/pr10-limited-live-canary.yml"

permissions:
  contents: read

jobs:
  focused:
    name: PR-10 fail-closed foundation
    runs-on: ubuntu-24.04
    env:
      PAPER_TRADING_ONLY: "true"
      LIVE_TRADING_ENABLED: "false"
      JITO_ENABLED: "false"
      KAMINO_LIQUIDATION_ENABLED: "false"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13.13"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt
      - run: python -m pip install --requirement requirements.txt
      - run: python -m pip install --requirement requirements-dev.txt
      - run: python -m pip install --no-deps .
      - name: Black
        run: |
          python -m black --check \
            src/live_canary/roadmap_pr10.py \
            tests/test_pr10_limited_live_canary.py
      - name: Mypy
        run: python -m mypy --config-file mypy.ini src/live_canary/roadmap_pr10.py
      - name: Focused tests
        run: |
          python -m pytest tests/test_pr10_limited_live_canary.py -q \
            --disable-socket --allow-unix-socket
      - name: Compile
        run: |
          python -m compileall -q \
            src/live_canary/roadmap_pr10.py \
            tests/test_pr10_limited_live_canary.py
