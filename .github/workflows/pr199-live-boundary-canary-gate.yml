name: PR-199 live boundary canary gate

on:
  pull_request:
    paths:
      - "src/pr199_live_boundary_canary_gate.py"
      - "tests/test_pr199_live_boundary_canary_gate.py"
      - "docs/pr199_live_boundary_canary_gate.md"
      - ".github/workflows/pr199-live-boundary-canary-gate.yml"
  push:
    branches:
      - roadmap-pr-199-live-boundary-canary-gate

permissions:
  contents: read

jobs:
  focused-verification:
    runs-on: ubuntu-24.04
    env:
      PAPER_TRADING_ONLY: "true"
      LIVE_TRADING_ENABLED: "false"
      JITO_ENABLED: "false"
      KAMINO_LIQUIDATION_ENABLED: "false"
      PYTHONPATH: "."
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - run: python -m pip install --requirement requirements.txt
      - run: python -m pip install --requirement requirements-dev.txt
      - run: >-
          python -m py_compile
          src/pr199_live_boundary_canary_gate.py
          tests/test_pr199_live_boundary_canary_gate.py
      - run: >-
          python -m flake8
          src/pr199_live_boundary_canary_gate.py
          tests/test_pr199_live_boundary_canary_gate.py
          --select=E9,F63,F7,F82
      - run: >-
          python -m pytest -q
          tests/test_pr199_live_boundary_canary_gate.py
      - run: >-
          python -m compileall -q
          src/pr199_live_boundary_canary_gate.py
          tests/test_pr199_live_boundary_canary_gate.py
