name: PR-210 measured sender-free qualification gate

on:
  pull_request:
    branches:
      - main
    paths:
      - "src/pr210_measured_sender_free_qualification.py"
      - "tests/test_pr210_measured_sender_free_qualification.py"
      - "docs/pr210_measured_sender_free_qualification_gate.md"
      - ".github/workflows/pr210-measured-sender-free-qualification.yml"
  push:
    branches:
      - pr-210-measured-sender-free-qualification-gate
  workflow_dispatch:

permissions:
  contents: read

jobs:
  measured-sender-free-qualification:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    env:
      PAPER_TRADING_ONLY: "true"
      LIVE_TRADING_ENABLED: "false"
      JITO_ENABLED: "false"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
      - name: Install dependencies
        run: |
          python -m pip install --requirement requirements.txt
          python -m pip install --requirement requirements-dev.txt
          python -m pip install --no-deps .
      - name: Compile PR-210 boundary
        run: |
          python -m compileall -q \
            src/pr210_measured_sender_free_qualification.py \
            tests/test_pr210_measured_sender_free_qualification.py
      - name: Critical static errors
        run: |
          python -m flake8 \
            src/pr210_measured_sender_free_qualification.py \
            tests/test_pr210_measured_sender_free_qualification.py \
            --count --select=E9,F63,F7,F82 --show-source --statistics
      - name: Focused regression suite
        run: |
          python -m pytest \
            tests/test_pr210_measured_sender_free_qualification.py \
            -q --disable-socket --allow-unix-socket
