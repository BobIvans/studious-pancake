name: PR-203 final promotion governance

on:
  pull_request:
    branches:
      - main
    paths:
      - "src/release_gate/final_promotion_governance_pr203.py"
      - "tests/test_pr203_final_promotion_governance.py"
      - "docs/pr203_final_promotion_governance.md"
      - "config/format_targets.txt"
      - ".github/workflows/pr203-final-promotion-governance.yml"
  push:
    branches:
      - roadmap-pr-203-final-promotion-governance

permissions:
  contents: read

jobs:
  final-promotion-governance:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install dependencies
        run: |
          python -m pip install --requirement requirements.txt
          python -m pip install --requirement requirements-dev.txt
          python -m pip install --no-deps .
      - name: Black
        run: |
          python -m black --check \
            src/release_gate/final_promotion_governance_pr203.py \
            tests/test_pr203_final_promotion_governance.py
      - name: Mypy
        run: |
          python -m mypy --config-file mypy.ini \
            src/release_gate/final_promotion_governance_pr203.py
      - name: Focused regression suite
        run: |
          python -m pytest \
            tests/test_pr203_final_promotion_governance.py \
            -q --disable-socket --allow-unix-socket \
            --junitxml=pr203-junit.xml
      - name: Compile governance gate
        run: |
          python -m compileall -q \
            src/release_gate/final_promotion_governance_pr203.py \
            tests/test_pr203_final_promotion_governance.py
      - name: Record focused evidence identities
        shell: bash
        run: |
          sha256sum \
            src/release_gate/final_promotion_governance_pr203.py \
            tests/test_pr203_final_promotion_governance.py \
            pr203-junit.xml > pr203-focused-evidence.sha256
      - name: Upload focused evidence
        uses: actions/upload-artifact@v4
        with:
          name: pr203-final-promotion-governance
          path: |
            pr203-junit.xml
            pr203-focused-evidence.sha256
          if-no-files-found: error
          retention-days: 14
