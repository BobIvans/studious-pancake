name: PR-206 latest-main finalizer

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

concurrency:
  group: pr206-latest-main-finalizer
  cancel-in-progress: false

jobs:
  merge-and-verify:
    if: github.head_ref == 'pr-206-durable-time-semantic-replay'
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
      - name: Merge latest main without committing
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin main
          git merge --no-commit --no-ff origin/main
          test -z "$(git diff --name-only --diff-filter=U)"
      - name: Install verification dependencies
        run: |
          python -m pip install --requirement requirements.txt
          python -m pip install --requirement requirements-dev.txt
          python -m pip install --no-deps .
      - name: Verify exact formatting and PR-206 acceptance
        env:
          PAPER_TRADING_ONLY: "true"
          LIVE_TRADING_ENABLED: "false"
          JITO_ENABLED: "false"
          KAMINO_LIQUIDATION_ENABLED: "false"
        run: |
          python -m black --check \
            src/pr195_durable_kernel_v3.py \
            src/pr206_durable_state.py \
            scripts/verify_pr206_durable_state.py \
            tests/test_pr195_durable_kernel_v3.py \
            tests/test_pr206_durable_state.py
          python scripts/verify_pr206_durable_state.py --json
          python scripts/verify_pr194_required_controls.py
          PYTHONPATH=. python scripts/validate_authority_map.py
          python -m pytest \
            tests/test_pr195_durable_lifecycle.py \
            tests/test_pr195_durable_kernel_v3.py \
            tests/test_pr206_durable_state.py \
            tests/test_pr194_required_control_manifest.py \
            tests/test_pr194_production_surface_manifest.py \
            tests/test_pr01_authority_map.py \
            -q --disable-socket --allow-unix-socket
      - name: Commit latest-main integration and remove finalizer
        shell: bash
        run: |
          set -euo pipefail
          rm .github/workflows/pr206-latest-main-materialization.yml
          git add -A
          git diff --cached --check
          git commit -m "Merge latest main and finalize PR-206 durable state"
          git push origin "HEAD:${{ github.head_ref }}"
