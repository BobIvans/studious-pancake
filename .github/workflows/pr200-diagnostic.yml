name: PR-200 diagnostic

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - pr-200-nonblocking-durable-io-20260723

permissions:
  contents: read

jobs:
  diagnostic:
    runs-on: ubuntu-24.04
    env:
      PAPER_TRADING_ONLY: "true"
      LIVE_TRADING_ENABLED: "false"
      JITO_ENABLED: "false"
      KAMINO_LIQUIDATION_ENABLED: "false"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - run: python -m pip install --requirement requirements.txt
      - run: python -m pip install --requirement requirements-dev.txt
      - name: Capture verification
        id: verify
        shell: bash
        run: |
          set +e
          python scripts/verify_repo.py > pr200-verification.log 2>&1
          code=$?
          echo "$code" > pr200-verification-exit-code.txt
          exit 0
      - name: Upload diagnostic
        uses: actions/upload-artifact@v4
        with:
          name: pr200-verification-diagnostic
          path: |
            pr200-verification.log
            pr200-verification-exit-code.txt
          if-no-files-found: error
