name: PR-211 signer outbox finality gate

on:
  pull_request:
    paths:
      - 'src/pr211_signer_outbox_finality_gate.py'
      - 'tests/test_pr211_signer_outbox_finality_gate.py'
      - 'docs/pr211_signer_outbox_finality_gate.md'
      - '.github/workflows/pr211-signer-outbox-finality-gate.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  pr211-signer-outbox-finality-gate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install pytest
      - name: Compile focused PR-211 gate
        run: |
          python -m py_compile \
            src/pr211_signer_outbox_finality_gate.py \
            tests/test_pr211_signer_outbox_finality_gate.py
      - name: Run focused tests
        run: python -m pytest -q tests/test_pr211_signer_outbox_finality_gate.py
      - name: Compile all focused files
        run: python -m compileall -q src/pr211_signer_outbox_finality_gate.py tests/test_pr211_signer_outbox_finality_gate.py
