name: MPR-31 final promotion gate

on:
  pull_request:
    paths:
      - "src/release_gate/mpr31_final_promotion_gate.py"
      - "tests/test_mpr31_final_promotion_gate.py"
      - "docs/mpr31_final_promotion_gate.md"
      - ".github/workflows/mpr31-final-promotion-gate.yml"

permissions:
  contents: read

jobs:
  final-promotion-gate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.11"

      - name: Install focused test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install -r requirements-dev.txt

      - name: Compile MPR-31 surface
        run: |
          python -m py_compile \
            src/release_gate/mpr31_final_promotion_gate.py \
            tests/test_mpr31_final_promotion_gate.py

      - name: Run focused MPR-31 tests
        run: python -m pytest -q tests/test_mpr31_final_promotion_gate.py
