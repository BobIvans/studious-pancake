name: MPR-07 operations promotion gate

on:
  pull_request:
    paths:
      - "src/release_gate/mpr07_operations_promotion_gate.py"
      - "tests/test_mpr07_operations_promotion_gate.py"
      - "docs/mpr07_operations_promotion_gate.md"
      - ".github/workflows/mpr07-operations-promotion-gate.yml"
  push:
    branches:
      - roadmap/mpr-07-operations-promotion-gate

permissions:
  contents: read

jobs:
  focused-verification:
    runs-on: ubuntu-24.04
    env:
      PAPER_TRADING_ONLY: "true"
      LIVE_TRADING_ENABLED: "false"
      JITO_ENABLED: "false"
      KAMINO_LIQUIDATION_ENABLED: "false"
      PYTHONPATH: "."
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - run: python -m pip install --requirement requirements.txt
      - run: python -m pip install --requirement requirements-dev.txt
      - run: >-
          python -m py_compile
          src/release_gate/mpr07_operations_promotion_gate.py
          tests/test_mpr07_operations_promotion_gate.py
      - run: >-
          python -m pytest -q
          tests/test_mpr07_operations_promotion_gate.py
      - run: >-
          python -m compileall -q
          src/release_gate/mpr07_operations_promotion_gate.py
          tests/test_mpr07_operations_promotion_gate.py
