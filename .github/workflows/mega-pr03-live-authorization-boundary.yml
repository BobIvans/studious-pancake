name: MEGA-PR-03 live authorization boundary

on:
  pull_request:
    paths:
      - "src/submission/mega_pr03_live_authorization_gate.py"
      - "tests/test_mega_pr03_live_authorization_gate.py"
      - "docs/mega_pr03_live_authorization_boundary.md"
      - ".github/workflows/mega-pr03-live-authorization-boundary.yml"
  workflow_dispatch:

permissions:
  contents: read

env:
  PAPER_TRADING_ONLY: "true"
  LIVE_TRADING_ENABLED: "false"
  JITO_ENABLED: "false"
  KAMINO_LIQUIDATION_ENABLED: "false"
  PYTHONPATH: "."

jobs:
  live-authorization-boundary:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.13"
      - name: Install focused test dependencies
        run: python -m pip install -r requirements.txt pytest==9.0.2
      - name: Compile MEGA-PR-03 surface
        run: |
          python -m py_compile \
            src/submission/mega_pr03_live_authorization_gate.py \
            tests/test_mega_pr03_live_authorization_gate.py
      - name: Run focused MEGA-PR-03 tests
        run: python -m pytest -q tests/test_mega_pr03_live_authorization_gate.py
