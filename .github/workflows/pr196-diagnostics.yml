name: PR-196 verifier diagnostics

on:
  push:
    branches:
      - roadmap/pr-196-durable-runtime-kernel

permissions:
  contents: read

jobs:
  diagnostics:
    runs-on: ubuntu-24.04
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install dependencies
        run: |
          python -m pip install --requirement requirements.txt
          python -m pip install --requirement requirements-dev.txt
          python -m pip install --no-deps .
      - name: Capture verifier stages
        shell: bash
        run: |
          set +e
          mkdir -p pr196-diagnostics
          python -m pip check > pr196-diagnostics/00-pip-check.log 2>&1; echo $? > pr196-diagnostics/00-pip-check.status
          python scripts/quality_gate.py --with-dependency-audit > pr196-diagnostics/01-quality-gate.log 2>&1; echo $? > pr196-diagnostics/01-quality-gate.status
          python scripts/validate_authority_map.py > pr196-diagnostics/02-authority-map.log 2>&1; echo $? > pr196-diagnostics/02-authority-map.status
          python scripts/package_smoke.py > pr196-diagnostics/03-package-smoke.log 2>&1; echo $? > pr196-diagnostics/03-package-smoke.status
          python -m compileall -q arb_bot.py src scripts tests > pr196-diagnostics/04-compileall.log 2>&1; echo $? > pr196-diagnostics/04-compileall.status
          python arb_bot.py status --json > pr196-diagnostics/05-status.log 2>&1; echo $? > pr196-diagnostics/05-status.status
          python arb_bot.py capabilities --json > pr196-diagnostics/06-capabilities.log 2>&1; echo $? > pr196-diagnostics/06-capabilities.status
          python -m pytest tests/test_pr01_authority_map.py tests/test_pr023_runtime_truth.py tests/test_launcher_startup_smoke.py tests/test_import_smoke.py tests/test_quality_quarantine.py tests/test_pr087_package_boundary.py tests/test_pr101_marginfi_complete_protocol_evidence.py tests/test_pr106_canonical_sender_lifecycle_disabled.py tests/test_pr115_simulation_owned_economic_proof.py tests/test_pr116_coherent_marginfi_snapshot_oracle.py tests/test_pr121_single_durable_lifecycle_truth.py tests/test_pr120_secret_resolver_config_jito.py tests/test_pr125_lst_governance_policy.py tests/test_pr136_rooted_rpc_quorum.py tests/test_pr140_data_lineage_quarantine.py -q --disable-socket --allow-unix-socket > pr196-diagnostics/07-focused-pytest.log 2>&1; echo $? > pr196-diagnostics/07-focused-pytest.status
          python -m pytest -m "not live and not manual" --disable-socket --allow-unix-socket -q > pr196-diagnostics/08-full-pytest.log 2>&1; echo $? > pr196-diagnostics/08-full-pytest.status
          cat pr196-diagnostics/*.status
      - uses: actions/upload-artifact@v4
        with:
          name: pr196-verifier-diagnostics
          path: pr196-diagnostics
          if-no-files-found: error
          retention-days: 1
