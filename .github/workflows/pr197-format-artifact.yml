name: PR-197 formatter artifact

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - pr-197-archive-complete-resubmission

permissions:
  contents: write

jobs:
  format:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: pr-197-archive-complete-resubmission
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - run: python -m pip install --requirement requirements-dev.txt
      - name: Format PR-197 targets
        run: |
          python -m black \
            src/submission/resubmission_proof_pr197.py \
            tests/test_pr197_archive_complete_resubmission.py
      - name: Commit formatted targets
        if: github.event_name == 'push'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            src/submission/resubmission_proof_pr197.py \
            tests/test_pr197_archive_complete_resubmission.py
          if git diff --cached --quiet; then
            exit 0
          fi
          git commit -m "style(PR-197): apply Black formatting"
          git push origin HEAD:pr-197-archive-complete-resubmission
      - uses: actions/upload-artifact@v4
        with:
          name: pr197-black-formatted
          path: |
            src/submission/resubmission_proof_pr197.py
            tests/test_pr197_archive_complete_resubmission.py
          if-no-files-found: error
