name: MPR-06 management audit anchor

on:
  pull_request:
    branches:
      - main
    paths:
      - "src/observability/audit_anchor_pr06.py"
      - "tests/test_pr06_management_audit_anchor.py"
      - "docs/pr06_management_audit_anchor.md"
      - ".github/workflows/mpr06-management-audit-anchor.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  focused-verification:
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    env:
      PAPER_TRADING_ONLY: "true"
      LIVE_TRADING_ENABLED: "false"
      JITO_ENABLED: "false"
      KAMINO_LIQUIDATION_ENABLED: "false"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install repository dependencies
        run: |
          python -m pip install --requirement requirements.txt
          python -m pip install --requirement requirements-dev.txt
          python -m pip install --no-deps .
      - name: Compile PR-06 audit-anchor files
        run: |
          python -m compileall -q \
            src/observability/audit_anchor_pr06.py \
            tests/test_pr06_management_audit_anchor.py
      - name: Run MPR-06 audit-anchor focused tests
        run: |
          python -m pytest \
            tests/test_pr06_management_audit_anchor.py \
            -q --disable-socket --allow-unix-socket
