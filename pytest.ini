[pytest]
asyncio_mode = auto
asyncio_default_fixture_loop_scope = function
log_cli = true
log_cli_level = INFO
markers =
    unit: fast offline tests with no external services
    integration: offline integration tests using mocks/fakes only
    simulation: deterministic offline simulations that do not submit transactions
    live: tests requiring real RPC, Jupiter, Jito, Helius, Kamino, OpenOcean, OKX, or other external services
    manual: tests intended for explicit human-triggered runs only
