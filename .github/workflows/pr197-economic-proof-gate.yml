name: PR-197 economic proof gate

on:
  pull_request:
    branches:
      - main
    paths:
      - "src/production_economic_proof_pr197.py"
      - "tests/test_pr197_production_economic_proof.py"
      - "docs/pr197_economic_proof_gate.md"
      - ".github/workflows/pr197-economic-proof-gate.yml"
  push:
    branches:
      - roadmap-pr-197-economic-proof-gate
  workflow_dispatch:

permissions:
  contents: read

jobs:
  economic-proof-gate:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    env:
      PAPER_TRADING_ONLY: "true"
      LIVE_TRADING_ENABLED: "false"
      JITO_ENABLED: "false"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
      - name: Install dependencies
        run: |
          python -m pip install --requirement requirements.txt
          python -m pip install --requirement requirements-dev.txt
          python -m pip install --no-deps .
      - name: Compile PR-197 boundary
        run: |
          python -m compileall -q \
            src/production_economic_proof_pr197.py \
            tests/test_pr197_production_economic_proof.py
      - name: Critical static errors
        run: |
          python -m flake8 \
            src/production_economic_proof_pr197.py \
            tests/test_pr197_production_economic_proof.py \
            --count --select=E9,F63,F7,F82 --show-source --statistics
      - name: Focused regression suite
        run: |
          python -m pytest \
            tests/test_pr197_production_economic_proof.py \
            -q --disable-socket --allow-unix-socket
