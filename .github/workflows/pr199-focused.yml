name: PR-199 focused economic vertical checks

on:
  pull_request:
    branches:
      - main
    paths:
      - "src/economics/execution_vertical_pr199.py"
      - "src/strategy/consumer.py"
      - "tests/test_pr199_economic_execution_vertical.py"
      - "tests/test_pr033_snapshot_detectors.py"
      - "docs/pr199_economic_execution_vertical.md"
      - ".github/workflows/pr199-focused.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  focused-regressions:
    runs-on: ubuntu-24.04
    env:
      PAPER_TRADING_ONLY: "true"
      LIVE_TRADING_ENABLED: "false"
      JITO_ENABLED: "false"
      KAMINO_LIQUIDATION_ENABLED: "false"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
      - run: python -m pip install --quiet --requirement requirements.txt
      - run: python -m pip install --quiet --requirement requirements-dev.txt
      - run: python -m pip install --quiet --no-deps .
      - name: Compile PR-199 boundary
        run: |
          python -m compileall -q \
            src/economics/execution_vertical_pr199.py \
            src/strategy/consumer.py \
            tests/test_pr199_economic_execution_vertical.py
      - name: Critical static errors
        run: |
          python -m flake8 \
            src/economics/execution_vertical_pr199.py \
            src/strategy/consumer.py \
            tests/test_pr199_economic_execution_vertical.py \
            --count --select=E9,F63,F7,F82 --show-source --statistics
      - name: PR-033 and PR-199 regressions
        run: |
          set -o pipefail
          python -m pytest \
            tests/test_pr033_snapshot_detectors.py \
            tests/test_pr199_economic_execution_vertical.py \
            -vv --disable-socket --allow-unix-socket 2>&1 | tee pr199-focused.log
      - name: Capture focused diagnostic
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pr199-focused-diagnostic
          path: pr199-focused.log
          if-no-files-found: ignore
          retention-days: 1
