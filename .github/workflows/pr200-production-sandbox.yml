name: PR-200 production sandbox

on:
  pull_request:
    branches:
      - main
    paths:
      - "src/production_sandbox_pr200.py"
      - "tests/test_pr200_production_sandbox.py"
      - "docs/pr200_production_sandbox.md"
      - ".github/workflows/pr200-production-sandbox.yml"
  push:
    branches:
      - roadmap-pr-200-production-sandbox-foundation
  workflow_dispatch:

permissions:
  contents: read

jobs:
  production-sandbox:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    env:
      PAPER_TRADING_ONLY: "true"
      LIVE_TRADING_ENABLED: "false"
      JITO_ENABLED: "false"
      KAMINO_LIQUIDATION_ENABLED: "false"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
      - name: Install dependencies
        run: |
          python -m pip install --requirement requirements.txt
          python -m pip install --requirement requirements-dev.txt
          python -m pip install --no-deps .
      - name: Compile PR-200 boundary
        run: |
          python -m compileall -q \
            src/production_sandbox_pr200.py \
            tests/test_pr200_production_sandbox.py
      - name: Critical static errors
        run: |
          python -m flake8 \
            src/production_sandbox_pr200.py \
            tests/test_pr200_production_sandbox.py \
            --count --select=E9,F63,F7,F82 --show-source --statistics
      - name: Focused regression suite
        run: |
          python -m pytest \
            tests/test_pr200_production_sandbox.py \
            -q --disable-socket --allow-unix-socket
