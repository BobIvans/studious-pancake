name: MPR-08 completion release truth gate

on:
  pull_request:
    paths:
      - "src/mpr08_completion_release_truth_gate.py"
      - "tests/test_mpr08_completion_release_truth_gate.py"
      - "docs/mpr08_completion_release_truth_gate.md"
      - ".github/workflows/mpr08-completion-release-truth-gate.yml"
  push:
    paths:
      - "src/mpr08_completion_release_truth_gate.py"
      - "tests/test_mpr08_completion_release_truth_gate.py"
      - "docs/mpr08_completion_release_truth_gate.md"
      - ".github/workflows/mpr08-completion-release-truth-gate.yml"

permissions:
  contents: read

jobs:
  focused-verification:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - name: Install requirements
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then python -m pip install -r requirements.txt; fi
          if [ -f requirements-dev.txt ]; then python -m pip install -r requirements-dev.txt; fi
      - name: Compile focused files
        run: |
          python -m py_compile \
            src/mpr08_completion_release_truth_gate.py \
            tests/test_mpr08_completion_release_truth_gate.py
      - name: Run focused tests
        run: |
          python -m pytest -q tests/test_mpr08_completion_release_truth_gate.py
      - name: Compile focused package path
        run: |
          python -m compileall -q \
            src/mpr08_completion_release_truth_gate.py \
            tests/test_mpr08_completion_release_truth_gate.py
