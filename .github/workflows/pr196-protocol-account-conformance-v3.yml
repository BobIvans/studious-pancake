name: PR-196 protocol account conformance V3

on:
  pull_request:
    paths:
      - 'src/pr196_protocol_account_conformance_v3.py'
      - 'tests/test_pr196_protocol_account_conformance_v3.py'
      - 'docs/pr196_v3_protocol_account_conformance.md'
      - '.github/workflows/pr196-protocol-account-conformance-v3.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  pr196-protocol-account-conformance-v3:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install pytest
      - name: Compile focused PR-196 gate
        run: |
          python -m py_compile \
            src/pr196_protocol_account_conformance_v3.py \
            tests/test_pr196_protocol_account_conformance_v3.py
      - name: Run focused tests
        run: python -m pytest -q tests/test_pr196_protocol_account_conformance_v3.py
