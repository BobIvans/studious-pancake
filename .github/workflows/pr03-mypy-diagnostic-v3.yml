name: Capture PR-03 mypy diagnostics v3

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  diagnostic:
    if: github.head_ref == 'roadmap-pr-03-fix-runner'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: roadmap-pr-03-rooted-provider-admission
          path: feature
      - uses: actions/checkout@v4
        with:
          ref: roadmap-pr-03-fix-runner
          path: runner
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - working-directory: feature
        run: python -m pip install --requirement requirements.txt
      - working-directory: feature
        run: python -m pip install --requirement requirements-dev.txt
      - name: Extract and apply hardening
        run: |
          python - <<'PY'
          from pathlib import Path

          lines = Path('runner/.github/workflows/pr03-fix-runner.yml').read_text().splitlines()
          start = next(i for i, line in enumerate(lines) if line.strip() == "python - <<'PY'") + 1
          end = next(i for i in range(start, len(lines)) if lines[i].strip() == 'PY')
          script = '\n'.join(line[10:] if line.startswith('          ') else line for line in lines[start:end]) + '\n'
          Path('/tmp/pr03-harden.py').write_text(script)
          PY
          cd feature
          python /tmp/pr03-harden.py
          python -m black src/providers/rooted_ingestion_pr03.py tests/test_rooted_ingestion_pr03.py
      - name: Capture mypy
        working-directory: feature
        shell: bash
        run: |
          set +e
          python -m mypy --config-file mypy.ini src/providers/rooted_ingestion_pr03.py > /tmp/pr03-mypy.log 2>&1
          echo $? > /tmp/pr03-mypy.rc
          set -e
          cat /tmp/pr03-mypy.log
      - uses: actions/upload-artifact@v4
        with:
          name: pr03-mypy-diagnostic-v3
          path: |
            /tmp/pr03-mypy.log
            /tmp/pr03-mypy.rc
            feature/src/providers/rooted_ingestion_pr03.py
            feature/tests/test_rooted_ingestion_pr03.py
