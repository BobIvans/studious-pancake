name: MEGA-PR-01 canonical runtime paper core

on:
  pull_request:
    paths:
      - "src/mega_pr01_canonical_runtime_paper_core.py"
      - "tests/test_mega_pr01_canonical_runtime_paper_core.py"
      - "scripts/verify_mega_pr01_canonical_runtime.py"
      - "docs/mega_pr01_canonical_runtime_paper_core.md"
      - ".github/workflows/mega-pr01-canonical-runtime.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  canonical-runtime-paper-core:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      PAPER_TRADING_ONLY: "true"
      LIVE_TRADING_ENABLED: "false"
      JITO_ENABLED: "false"
      KAMINO_LIQUIDATION_ENABLED: "false"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install focused dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install pytest==9.0.2
      - name: Run focused MEGA-PR-01 verifier
        run: python scripts/verify_mega_pr01_canonical_runtime.py
