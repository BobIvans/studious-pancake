name: PR-194 hermetic package surface

on:
  pull_request:
    paths:
      - "Dockerfile"
      - "setup.py"
      - "scripts/package_smoke.py"
      - "scripts/image_smoke.sh"
      - "src/production_surface.py"
      - "src/resources/production_surface_manifest.json"
      - "tests/test_pr194_production_surface_manifest.py"
      - "docs/pr194_hermetic_package_surface.md"
      - "config/format_targets.txt"
      - ".github/workflows/pr194-hermetic-package-surface.yml"
  push:
    branches:
      - pr-194-hermetic-supply-chain-baseline

permissions:
  contents: write

jobs:
  focused-verification:
    runs-on: ubuntu-24.04
    env:
      PAPER_TRADING_ONLY: "true"
      LIVE_TRADING_ENABLED: "false"
      JITO_ENABLED: "false"
    steps:
      - uses: actions/checkout@v4
        with:
          ref: pr-194-hermetic-supply-chain-baseline
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - run: python -m pip install --requirement requirements.txt
      - run: python -m pip install --requirement requirements-dev.txt
      - run: >-
          python -m black --check
          setup.py
          scripts/package_smoke.py
          src/production_surface.py
          tests/test_pr194_production_surface_manifest.py
      - run: python -m mypy src/production_surface.py
      - run: python -m pytest -q tests/test_pr194_production_surface_manifest.py
      - name: Run package smoke with diagnostic capture
        run: |
          mkdir -p diagnostics
          set +e
          python scripts/package_smoke.py > diagnostics/pr194-package-smoke.log 2>&1
          status=$?
          set -e
          if [ "$status" -eq 0 ]; then
            rm -f diagnostics/pr194-package-smoke.log
            exit 0
          fi
          tail -n 80 diagnostics/pr194-package-smoke.log
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add diagnostics/pr194-package-smoke.log
          git commit -m "PR-194 capture package smoke diagnostic"
          git push origin HEAD:pr-194-hermetic-supply-chain-baseline
          exit "$status"
      - run: >-
          python -m compileall -q
          setup.py
          scripts/package_smoke.py
          src/production_surface.py
