name: PR-196 pass3 external contract gates

on:
  pull_request:
    paths:
      - "src/external_contract_gates_pr196.py"
      - "tests/test_pr196_external_contract_gates.py"
      - "docs/roadmap/pr196_pass3_external_contract_gates.md"
      - ".github/workflows/pr196-pass3-external-contract-gates.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  focused:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install pytest
        run: python -m pip install pytest
      - name: Run focused PR-196 tests
        run: python -m pytest -q tests/test_pr196_external_contract_gates.py
      - name: Compile focused files
        run: |
          python -m py_compile \
            src/external_contract_gates_pr196.py \
            tests/test_pr196_external_contract_gates.py
