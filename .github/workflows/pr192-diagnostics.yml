name: PR-192 diagnostics

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  diagnostic:
    name: PR-192 ${{ matrix.check }}
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        check: [black, mypy, bandit, focused]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
      - run: python -m pip install --requirement requirements-dev.txt
      - name: Run diagnostic
        shell: bash
        run: |
          case "${{ matrix.check }}" in
            black)
              python -m black $(grep -vE '^[[:space:]]*(#|$)' config/format_targets.txt)
              git diff --binary > /tmp/pr192-black.patch
              ;;
            mypy)
              python -m mypy --config-file mypy.ini > /tmp/pr192-mypy.txt 2>&1 || true
              ;;
            bandit)
              python -m bandit -r arb_bot.py src scripts -x src/legacy_arb_bot.py,tests -lll -iii -q
              ;;
            focused)
              python -m pytest \
                tests/test_pr192_runtime_memory_confidentiality.py \
                tests/test_pr192_secure_cli_and_deployment.py \
                tests/test_pr192_secret_buffer.py \
                tests/test_pr025_packaging.py \
                -q
              ;;
          esac
      - name: Upload Black patch
        if: matrix.check == 'black'
        uses: actions/upload-artifact@v4
        with:
          name: pr192-black-patch
          path: /tmp/pr192-black.patch
          if-no-files-found: error
          retention-days: 1
      - name: Upload mypy diagnostics
        if: matrix.check == 'mypy'
        uses: actions/upload-artifact@v4
        with:
          name: pr192-mypy-diagnostics
          path: /tmp/pr192-mypy.txt
          if-no-files-found: error
          retention-days: 1
