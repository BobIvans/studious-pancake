name: PR-09 materialize repository

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  materialize:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
      - name: Archive exact checkout
        run: |
          tar --exclude=.git -czf /tmp/studious-pr09-source.tar.gz .
      - uses: actions/upload-artifact@v4
        with:
          name: studious-pr09-source
          path: /tmp/studious-pr09-source.tar.gz
          if-no-files-found: error
          retention-days: 1
