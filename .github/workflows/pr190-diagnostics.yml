name: PR-190 diagnostics

on:
  push:
    branches: [pr-190-canonical-config-identity-20260723]
    paths:
      - .github/workflows/pr190-diagnostics.yml

permissions:
  contents: read

jobs:
  capture-verification:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - run: python -m pip install --requirement requirements.txt
      - run: python -m pip install --requirement requirements-dev.txt
      - run: python -m pip install --no-deps .
      - name: Capture repository verification
        shell: bash
        run: |
          set +e
          python scripts/verify_repo.py > pr190-diagnostics.txt 2>&1
          status=$?
          echo "exit_status=$status" >> pr190-diagnostics.txt
          exit 0
      - uses: actions/upload-artifact@v4
        with:
          name: pr190-diagnostics
          path: pr190-diagnostics.txt
          if-no-files-found: error
