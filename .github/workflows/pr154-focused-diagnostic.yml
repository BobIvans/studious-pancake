name: PR-154 focused diagnostic

on:
  pull_request:
    paths:
      - "src/data_plane/pr154_reliability_supervisor.py"
      - "tests/test_pr154_data_reliability_supervisor.py"
      - "tests/test_pr154_quota_release_regression.py"
      - ".github/workflows/pr154-focused-diagnostic.yml"

permissions:
  contents: read

jobs:
  focused-diagnostic:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.13"
          cache: pip
      - name: Install verification dependencies
        run: |
          python -m pip install --quiet --requirement requirements.txt
          python -m pip install --quiet --requirement requirements-dev.txt
          python -m pip install --quiet --no-deps .
      - name: Capture focused results
        shell: bash
        run: |
          set +e
          python -m mypy --config-file mypy.ini src/data_plane/pr154_reliability_supervisor.py > pr154-mypy.txt 2>&1
          echo "$?" > pr154-mypy.exit
          python -m pytest -q tests/test_pr154_data_reliability_supervisor.py tests/test_pr154_quota_release_regression.py > pr154-pytest.txt 2>&1
          echo "$?" > pr154-pytest.exit
          set -e
      - name: Upload diagnostic artifact
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: pr154-focused-diagnostic
          path: |
            pr154-mypy.txt
            pr154-mypy.exit
            pr154-pytest.txt
            pr154-pytest.exit
      - name: Enforce focused results
        shell: bash
        run: |
          cat pr154-mypy.txt
          cat pr154-pytest.txt
          test "$(cat pr154-mypy.exit)" = "0"
          test "$(cat pr154-pytest.exit)" = "0"
