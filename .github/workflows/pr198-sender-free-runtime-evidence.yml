name: PR-198 sender-free runtime evidence

on:
  pull_request:
    branches:
      - main
    paths:
      - "src/paper_shadow/sender_free_runtime_evidence_pr198.py"
      - "tests/test_pr198_sender_free_runtime_evidence.py"
      - "docs/pr198_sender_free_runtime_evidence.md"
      - "config/format_targets.txt"
      - ".github/workflows/pr198-sender-free-runtime-evidence.yml"
  push:
    branches:
      - roadmap-pr-198-sender-free-runtime-evidence

permissions:
  contents: read

jobs:
  sender-free-runtime-evidence:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install dependencies
        run: |
          python -m pip install --requirement requirements.txt
          python -m pip install --requirement requirements-dev.txt
          python -m pip install --no-deps .
      - name: Black
        run: |
          python -m black --check \
            src/paper_shadow/sender_free_runtime_evidence_pr198.py \
            tests/test_pr198_sender_free_runtime_evidence.py
      - name: Mypy
        run: |
          python -m mypy --config-file mypy.ini \
            src/paper_shadow/sender_free_runtime_evidence_pr198.py
      - name: Focused regression suite
        run: |
          python -m pytest \
            tests/test_pr198_sender_free_runtime_evidence.py \
            -q --disable-socket --allow-unix-socket \
            --junitxml=pr198-sender-free-runtime-evidence-junit.xml
      - name: Compile sender-free evidence gate
        run: |
          python -m compileall -q \
            src/paper_shadow/sender_free_runtime_evidence_pr198.py \
            tests/test_pr198_sender_free_runtime_evidence.py
      - name: Record focused evidence identities
        shell: bash
        run: |
          sha256sum \
            src/paper_shadow/sender_free_runtime_evidence_pr198.py \
            tests/test_pr198_sender_free_runtime_evidence.py \
            pr198-sender-free-runtime-evidence-junit.xml \
            > pr198-sender-free-runtime-evidence.sha256
      - name: Upload focused evidence
        uses: actions/upload-artifact@v4
        with:
          name: pr198-sender-free-runtime-evidence
          path: |
            pr198-sender-free-runtime-evidence-junit.xml
            pr198-sender-free-runtime-evidence.sha256
          if-no-files-found: error
          retention-days: 14
