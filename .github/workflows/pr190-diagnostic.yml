name: PR-190 focused diagnostic

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - run: python -m pip install --requirement requirements.txt
      - run: python -m pip install --requirement requirements-dev.txt
      - run: python -m pip install --no-deps .
      - name: Flake8 undefined names
        run: python -m flake8 src/config src/execution tests/test_pr190_canonical_config.py --count --select=E9,F63,F7,F82 --show-source --statistics
      - name: Mypy
        run: python -m mypy --config-file mypy.ini
      - name: PR-190 focused tests
        run: >-
          python -m pytest -q
          tests/test_pr026_typed_config.py
          tests/test_live_readiness.py
          tests/test_pr190_canonical_config.py
          --disable-socket --allow-unix-socket
