name: MPR-CLOSE-05 isolated signer jito bounded canary

on:
  pull_request:
    paths:
      - src/mpr_close_05_isolated_signer_jito_canary.py
      - scripts/verify_isolated_signer_boundary.py
      - scripts/verify_jito_settlement_semantics.py
      - scripts/verify_canary_latches.py
      - tests/test_mpr_close_05_isolated_signer_jito_canary.py
      - docs/mpr_close_05_isolated_signer_jito_bounded_canary.md
      - .github/workflows/mpr-close-05-isolated-signer-jito-bounded-canary.yml

permissions:
  contents: read

jobs:
  mpr-close-05:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8
      - name: Setup Python
        uses: actions/setup-python@e797f83bcb11b83ae66e0230d6156d7c80228e7c
        with:
          python-version: '3.13'
      - name: Install pytest
        run: python -m pip install pytest==9.0.2
      - name: Compile MPR-CLOSE-05
        run: python -m compileall -q src scripts tests
      - name: Verify isolated signer boundary
        run: python scripts/verify_isolated_signer_boundary.py --strict --json
      - name: Verify Jito settlement semantics
        run: python scripts/verify_jito_settlement_semantics.py --strict --json
      - name: Verify canary latches
        run: python scripts/verify_canary_latches.py --strict --json
      - name: Run focused tests
        env:
          PYTHONPATH: .
        run: python -m pytest -q tests/test_mpr_close_05_isolated_signer_jito_canary.py
